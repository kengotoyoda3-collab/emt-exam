question":"505【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 生命倫理四原則ではないものはどれか。2つ選べ。","choices":["自律尊重の原則","善行の原則","医療者中心の原則","無危害の原則","最大利益の原則"],"answer":[3,5],"source":{"page":"p.10～11","title":"生命倫理四原則"}},{"id":506,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"506【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 生命倫理四原則のうち、「善行の原則」を最も適切に説明しているのはどれか。1つ選べ。","choices":["医療資源を公平に分配すること。","傷病者の自己決定を尊重すること。","傷病者に利益をもたらすよう努めること。","傷病者に危害を加えないこと。","医療従事者の利益を優先すること。"],"answer":[3],"source":{"page":"p.10～11","title":"生命倫理四原則"}},{"id":507,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"507【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 生命倫理四原則に含まれるものはどれか。2つ選べ。","choices":["自律尊重の原則","公正の原則","応召義務の原則","守秘義務の原則","説明責任の原則"],"answer":[1,2],"source":{"page":"p.10～11","title":"生命倫理四原則"}},{"id":508,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"508【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 インフォームド・コンセントが成立するために最も重要な条件はどれか。1つ選べ。","choices":["家族のみが同意すること。","医療従事者が最善と判断した治療を行うこと。","傷病者が十分な説明を受け、理解した上で同意すること。","同意書に署名することだけで十分である。","救急救命士が代理で同意すること。"],"answer":[3],"source":{"page":"p.12～13","title":"インフォームド・コンセント"}},{"id":509,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"509【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 意識清明で判断能力のある傷病者が、十分な説明を受けたうえで処置を希望しない意思を示した。この場面で最も優先して尊重すべきものはどれか。1つ選べ。","choices":["家族の希望","医療従事者の経験","傷病者本人の自己決定","搬送時間の短縮","救急隊長の判断"],"answer":[3],"source":{"page":"p.12～13","title":"患者の権利・インフォームド・コンセント"}},{"id":510,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"510【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 患者の権利に関するリスボン宣言の内容として適切なのはどれか。2つ選べ。","choices":["患者は十分な説明を受ける権利を有する。","患者は自己決定権を有する。","患者は医療従事者へ治療方法を命令できる。","患者は診療録を書き換えることができる。","患者は医学研究への参加を義務付けられる。"],"answer":[1,2],"source":{"page":"p.12～13","title":"リスボン宣言・患者の権利"}},{"id":511,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"511【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 QOL（Quality of Life）の考え方として最も適切なのはどれか。1つ選べ。","choices":["延命のみを最優先する考え方である。","医療費を最小限に抑えることを目的とする。","身体的・精神的・社会的側面を含めた生活の質を重視する。","医療従事者の満足度を評価する指標である。","病院の設備を評価する概念である。"],"answer":[3],"source":{"page":"p.12～13","title":"QOL"}},{"id":512,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"512【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 ACP（アドバンス・ケア・プランニング）の特徴として適切なのはどれか。2つ選べ。","choices":["本人の意思を尊重する。","本人・家族・医療従事者が繰り返し話し合う。","一度決定した内容は変更できない。","終末期のみを対象とする制度である。","医療従事者だけで方針を決定する。"],"answer":[1,2],"source":{"page":"p.12～13","title":"ACP"}},{"id":513,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"513【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊が高齢傷病者を搬送している。傷病者は意思表示が明確であり、「家族にも自分の希望を伝えてある」と話している。このような事前の話し合いを表すものとして最も適切なのはどれか。1つ選べ。","choices":["EBM","BLS","ACP","DNAR","ICLS"],"answer":[3],"source":{"page":"p.12～13","title":"ACP"}},{"id":514,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"514【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 ヘルシンキ宣言が主に対象としているものはどれか。1つ選べ。","choices":["医学研究における倫理","医療保険制度","救急搬送体制","地域医療計画","医療機器の安全基準"],"answer":[1],"source":{"page":"p.10～11","title":"ヘルシンキ宣言"}},{"id":515,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"515【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 ヘルシンキ宣言に基づく医学研究の基本原則として適切なのはどれか。2つ選べ。","choices":["被験者の人権と尊厳を尊重する。","被験者の安全を最優先する。","研究成果を優先し危険性は考慮しない。","同意は不要である。","医療従事者の利益を優先する。"],"answer":[1,2],"source":{"page":"p.10～11","title":"ヘルシンキ宣言"}},{"id":516,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"516【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 ジュネーブ宣言の内容として最も適切なのはどれか。1つ選べ。","choices":["医学研究の倫理指針を定めたものである。","患者の権利を定めた宣言である。","医師としての職業倫理と責務を示した宣言である。","救急医療体制の整備を目的とした宣言である。","医療事故の対応を定めた宣言である。"],"answer":[3],"source":{"page":"p.10～11","title":"ジュネーブ宣言"}},{"id":517,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"517【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 ジュネーブ宣言に示される医療従事者の基本姿勢として適切なのはどれか。2つ選べ。","choices":["患者の健康と福祉を最優先に考える。","人権と人格を尊重する。","社会的地位によって診療内容を変更する。","医療従事者自身の利益を最優先する。","患者情報を自由に公開できる。"],"answer":[1,2],"source":{"page":"p.10～11","title":"ジュネーブ宣言"}},{"id":518,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"518【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 救急救命士が業務中に知り得た個人情報を適切に取り扱う主な理由として最も適切なのはどれか。1つ選べ。","choices":["搬送時間を短縮するため。","傷病者のプライバシーと信頼関係を守るため。","医療費を削減するため。","業務記録を簡略化するため。","病院間の競争を促進するため。"],"answer":[2],"source":{"page":"p.14～15","title":"守秘義務・個人情報保護"}},{"id":519,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"519【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 救急救命士の日常業務上の責務として適切なのはどれか。2つ選べ。","choices":["継続的に知識・技術を向上させる。","傷病者の人格を尊重する。","個人的な興味で診療情報を閲覧する。","SNSで症例を共有する。","傷病者の社会的立場により対応を変更する。"],"answer":[1,2],"source":{"page":"p.14～15","title":"救急救命士の責務"}},{"id":520,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"520【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊が搬送した傷病者について、帰署後に隊員がSNSへ「氏名は伏せたので問題ない」として現場写真を投稿しようとしている。最も適切な対応はどれか。1つ選べ。","choices":["氏名を伏せているため投稿してよい。","家族の了承があれば投稿してよい。","教育目的であれば自由に投稿してよい。","業務上知り得た情報であり、投稿してはならない。","勤務時間外であれば投稿してよい。"],"answer":[4],"source":{"page":"p.14～15","title":"守秘義務・個人情報保護・職業倫理"}},{"id":521,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"521【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療におけるEBM（Evidence-Based Medicine）の考え方として最も適切なのはどれか。1つ選べ。","choices":["経験のみを根拠として診療を行う。","最新の研究成果、臨床経験および患者の価値観を総合して判断する。","教科書のみを根拠として診療を行う。","医療従事者の判断を最優先し、患者の意思は考慮しない。","AIの診断結果のみを根拠として診療を行う。"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・EBM"}},{"id":522,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"522【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 科学的研究において信頼性を高めるために重要なものはどれか。2つ選べ。","choices":["客観性","再現性","個人の経験のみ","権威者の意見のみ","偶然得られた結果"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考"}},{"id":523,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"523【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊が搬送した傷病者は、十分な説明を受けた後、「私はこの治療を希望しません」と明確に意思表示した。判断能力も保たれている。この場面で最も尊重すべき生命倫理四原則はどれか。1つ選べ。","choices":["善行の原則","無危害の原則","公正の原則","自律尊重の原則","誠実の原則"],"answer":[4],"source":{"page":"p.10～13","title":"生命倫理四原則・インフォームド・コンセント"}},{"id":524,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"524【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急救命士の専門職としての責務として適切なのはどれか。2つ選べ。","choices":["継続して知識・技術の向上に努める。","傷病者の人格と尊厳を尊重する。","経験のみを根拠として活動する。","守秘義務は退職後には消滅する。","傷病者情報は教育目的で自由に公開できる。"],"answer":[1,2],"source":{"page":"p.14～15","title":"救急救命士の責務・職業倫理"}},{"id":525,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"525【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊が搬送した傷病者について、帰署後に隊員が「勉強になるから」と現場写真を職場外のSNSグループへ投稿しようとしている。氏名や顔は写っていない。この行為に対する判断として最も適切なのはどれか。1つ選べ。","choices":["氏名が写っていないため問題ない。","教育目的であれば自由に投稿できる。","隊長の許可があれば投稿できる。","業務上知り得た情報であり、守秘義務の観点から投稿すべきではない。","勤務時間外であれば投稿できる。"],"answer":[4],"source":{"page":"p.14～15","title":"守秘義務・個人情報保護・職業倫理"}},{"id":526,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"526【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 科学的思考における「仮説と実証」の説明として最も適切なのはどれか。1つ選べ。","choices":["結果を先に決め、その結果に合う情報だけを集めること。","経験的に正しいと思われることを、検証せずに事実とすること。","観察や理論から仮説を立て、実験や観察によって確認すること。","多くの人が信じている考えを、そのまま科学的事実とすること。","権威ある人物の発言を根拠として結論を決定すること。"],"answer":[3],"source":{"page":"p.6～9","title":"科学的思考・仮説と実証"}},{"id":527,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"527【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 救急救命士が科学的思考を実践している行動として適切なのはどれか。2つ選べ。","choices":["バイタルサインを客観的に観察する。","得られた情報を医学的知識と照らして判断する。","先入観を優先して傷病者の状態を判断する。","「以前も同じだった」という経験だけで処置方針を決める。","記録を残さず、記憶だけで活動を振り返る。"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考・客観性"}},{"id":528,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"528【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊が「死亡している」と通報された傷病者に接触した。傷病者は意識がなく反応も乏しいが、救急救命士は呼吸・脈拍・瞳孔所見などを一つずつ確認した。この対応を最もよく説明する科学的思考の要素はどれか。1つ選べ。","choices":["主観性","客観性","権威性","慣習性","感情性"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・客観性"}},{"id":529,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"529【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 科学における「再現性」の説明として最も適切なのはどれか。1つ選べ。","choices":["研究者の立場によって結果が変わること。","同じ対象と方法であれば、同様の結果が得られること。","結果が一度だけ得られれば十分であること。","結論を多数決で決定できること。","感情的に納得できる説明であること。"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・再現性"}},{"id":530,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"530【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急救命士が非科学的思考に陥っている例として適切なのはどれか。2つ選べ。","choices":["客観的所見よりも思い込みを優先する。","医学的根拠のない慣例だけで判断する。","バイタルサインを測定して状態を評価する。","観察結果を記録し、後で検証できるようにする。","得られた情報を医学的知識と照合する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考・非科学的思考"}},{"id":531,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"531【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療における「エビデンス」として最も適切なのはどれか。1つ選べ。","choices":["個人の経験のみから得られた知識","科学的な研究によって得られた根拠","医療従事者の勘","多数決によって決定された意見","長年続いている慣習"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・EBM"}},{"id":532,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"532【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 EBM（Evidence-Based Medicine）を実践する際に考慮すべき要素はどれか。2つ選べ。","choices":["科学的根拠","患者の価値観・希望","医療従事者の思い込み","根拠のない慣例","偶然得られた経験のみ"],"answer":[1,2],"source":{"page":"p.6～9","title":"EBM"}},{"id":533,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"533【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊が胸痛を訴える傷病者を評価している。隊員Aは「以前にも似た症例があったから同じ疾患だ」と判断した。一方、隊員Bは病歴、バイタルサイン、12誘導心電図などを総合的に評価した。EBMの考え方に最も沿っているのはどちらか。1つ選べ。","choices":["隊員Aのみ","隊員Bのみ","どちらも同程度に適切","どちらも不適切","判断できない"],"answer":[2],"source":{"page":"p.6～9","title":"EBM・科学的思考"}},{"id":534,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"534【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療における「批判的思考（クリティカルシンキング）」として最も適切なのはどれか。1つ選べ。","choices":["他者の意見を否定することを目的とする。","得られた情報を根拠に基づいて客観的に評価する。","自分の経験だけを信頼する。","権威者の意見には疑問を持たない。","最初の印象だけで判断する。"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・批判的思考"}},{"id":535,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"535【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急救命士が科学的思考を維持するために重要な行動はどれか。2つ選べ。","choices":["新しい医学的知見を継続的に学ぶ。","自らの判断を振り返り検証する。","過去の経験だけを絶対視する。","根拠がなくても慣例に従う。","自分と異なる意見は排除する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考・生涯学習"}},{"id":536,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"536【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 救急救命士が生涯学習を継続する目的として最も適切なのはどれか。1つ選べ。","choices":["国家試験合格後は知識の更新が不要であるため。","医学・医療の進歩に対応し、安全で質の高い医療を提供するため。","同僚より知識を多く持つため。","昇任試験のためだけに学習するため。","経験年数が浅い職員のみ必要であるため。"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・生涯学習"}},{"id":537,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"537【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 医療従事者が継続的に学習することの意義として適切なのはどれか。2つ選べ。","choices":["医療技術の向上につながる。","最新の知見を臨床へ反映できる。","過去の経験だけで十分となる。","学術的根拠を無視した診療が可能になる。","ガイドラインの更新を確認する必要がなくなる。"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考・生涯学習"}},{"id":538,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"538【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊内で新しい心肺蘇生ガイドラインについて検討している。ある隊員は「昔からこの方法で問題なかった」と変更を拒否した。一方、別の隊員は最新のガイドラインと研究結果を確認し、活動方法を見直すことを提案した。最も適切な考え方はどれか。1つ選べ。","choices":["前者のみが適切である。","後者のみが適切である。","両者とも同程度に適切である。","ガイドラインは参考にしなくてよい。","年齢の高い隊員の意見を優先する。"],"answer":[2],"source":{"page":"p.6～9","title":"EBM・生涯学習"}},{"id":539,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"539【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療の質を向上させるためのPDCAサイクルにおいて、「Check」に該当するものはどれか。1つ選べ。","choices":["計画を立てる。","実際に実施する。","結果を評価・検証する。","改善策を実施する。","新たな目標を設定する。"],"answer":[3],"source":{"page":"p.6～9","title":"科学的思考・医療の質の向上"}},{"id":540,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"540【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急救命士が医療の質の向上を目的として実施する活動として適切なのはどれか。2つ選べ。","choices":["症例検討会に参加する。","活動内容を振り返り改善につなげる。","根拠のない慣例のみを継続する。","自己の知識更新を行わない。","最新のガイドラインを確認し活動へ反映する。"],"answer":[1,5],"source":{"page":"p.6～9","title":"科学的思考・医療の質の向上・生涯学習"}},{"id":541,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"541【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療の質を継続的に向上させる活動として、PDCAサイクルの「Act」に該当するものはどれか。1つ選べ。","choices":["活動計画を立案する。","計画に基づき活動を実施する。","活動結果を評価・分析する。","評価結果をもとに改善策を実施する。","新たな研究テーマを設定する。"],"answer":[4],"source":{"page":"p.6～9","title":"PDCAサイクル・医療の質の向上"}},{"id":542,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"542【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 医療の質を向上させるために有効な取り組みとして適切なのはどれか。2つ選べ。","choices":["症例検討会を実施する。","活動記録を分析し改善点を抽出する。","個人の経験のみを根拠とする。","他者からの意見を受け入れない。","ガイドラインの改訂を確認しない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療の質の向上・科学的思考"}},{"id":543,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"543【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊で症例検討会を実施したところ、活動内容に改善点が見つかった。隊員全員で改善策を決定し、次回出動から新しい方法を実践することとなった。この取り組みでPDCAサイクルの「Act」に該当するものはどれか。1つ選べ。","choices":["改善策を立案・実践すること。","活動前に目標を設定すること。","出動中に活動を実施すること。","活動終了後に結果を評価すること。","症例数を集計すること。"],"answer":[1],"source":{"page":"p.6～9","title":"PDCAサイクル"}},{"id":544,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"544【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 救急救命士が医療の質を維持・向上させるために最も重要な姿勢はどれか。1つ選べ。","choices":["自らの経験のみを信頼する。","一度習得した知識は変更しない。","根拠に基づき継続的に自己研鑽を行う。","他者からの助言を受けない。","慣例を最優先する。"],"answer":[3],"source":{"page":"p.6～9","title":"科学的思考・生涯学習"}},{"id":545,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"545【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 科学的根拠に基づく活動（EBM）の実践として適切なのはどれか。2つ選べ。","choices":["最新の研究成果を参考にする。","傷病者の価値観や希望を考慮する。","根拠がなくても慣例を優先する。","科学的根拠より経験だけを優先する。","他職種との情報共有を避ける。"],"answer":[1,2],"source":{"page":"p.6～9","title":"EBM・科学的思考"}},{"id":546,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"546【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療従事者が自己の知識や技術を客観的に評価し、改善につなげる活動として最も適切なのはどれか。1つ選べ。","choices":["自己の経験のみを信頼する。","活動を振り返り、改善点を明らかにする。","他者からの評価を受けない。","過去の成功事例のみを参考にする。","一度決めた方法を変更しない。"],"answer":[2],"source":{"page":"p.6～9","title":"PDCAサイクル・医療の質の向上"}},{"id":547,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"547【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 救急救命士が活動の質を維持・向上させるために重要な取り組みはどれか。2つ選べ。","choices":["症例検討会に参加する。","最新のガイドラインを継続的に確認する。","根拠より慣例を優先する。","他隊の活動を参考にしない。","自己評価を行わない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"生涯学習・医療の質向上"}},{"id":548,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"548【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊で症例検討を行ったところ、最新ガイドラインと異なる活動が行われていたことが判明した。今後の対応として最も適切なのはどれか。1つ選べ。","choices":["従来どおりの活動を継続する。","ガイドラインに基づき活動方法を見直す。","隊員個人の経験を優先する。","他隊が変更するまで様子を見る。","問題点を記録せず終了する。"],"answer":[2],"source":{"page":"p.6～9","title":"EBM・医療の質向上"}},{"id":549,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"549【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 救急救命士が活動記録を正確に作成する目的として最も適切なのはどれか。1つ選べ。","choices":["事務作業を増やすため。","活動内容を客観的に記録し、評価・改善に活用するため。","個人の能力を競うため。","病院へ責任を転嫁するため。","活動時間を延長するため。"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・医療の質向上"}},{"id":550,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"550【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 科学的思考に基づき救急活動を改善する取り組みとして適切なのはどれか。2つ選べ。","choices":["活動結果を分析し改善策を検討する。","最新の研究成果やガイドラインを活動へ反映する。","個人の思い込みを優先する。","客観的なデータを収集しない。","改善結果を再評価し、必要に応じて見直す。"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考・PDCAサイクル・EBM"}},{"id":551,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"551【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療における「質の保証（Quality Assurance：QA）」の目的として最も適切なのはどれか。1つ選べ。","choices":["医療費を削減すること。","一定水準以上の医療を継続して提供すること。","医療従事者の業務量を減らすこと。","新しい医療技術のみを導入すること。","医療事故の責任を明確にすること。"],"answer":[2],"source":{"page":"p.6～9","title":"医療の質・品質保証"}},{"id":552,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"552【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 医療の質を保証するための取り組みとして適切なのはどれか。2つ選べ。","choices":["ガイドラインを活用する。","継続的に業務改善を行う。","個人の経験のみを根拠とする。","問題点を記録しない。","他施設との情報共有を避ける。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療の質・継続的改善"}},{"id":553,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"553【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊で活動後の検証会を行った結果、搬送時間の遅延要因が明らかとなった。隊員は改善策を検討し、次回の活動に反映することとした。この取り組みの目的として最も適切なのはどれか。1つ選べ。","choices":["隊員個人の責任を追及するため。","医療の質を継続的に向上させるため。","活動時間を延長するため。","搬送件数を増やすため。","医療費を削減するため。"],"answer":[2],"source":{"page":"p.6～9","title":"PDCAサイクル・医療の質向上"}},{"id":554,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"554【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 救急救命士が最新の医療知識を維持する方法として最も適切なのはどれか。1つ選べ。","choices":["国家試験時の教科書だけを読み返す。","学会や講習会、最新ガイドラインなどから継続的に学習する。","経験年数が増えたら学習を終了する。","他者の活動は参考にしない。","自分の経験だけを信頼する。"],"answer":[2],"source":{"page":"p.6～9","title":"生涯学習"}},{"id":555,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"555【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急救命士が科学的思考に基づいて活動を改善するために重要なものはどれか。2つ選べ。","choices":["客観的なデータを収集する。","改善後の結果を評価する。","思い込みを優先する。","根拠がなくても従来の方法を継続する。","他者の意見を一切受け入れない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考・PDCAサイクル"}},{"id":556,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"556【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療の質を評価する「アウトカム評価」として最も適切なのはどれか。1つ選べ。","choices":["救急車内の資器材配置を評価すること。","救急隊員の勤務年数を調査すること。","傷病者の転帰や治療成果を評価すること。","活動マニュアルの冊子数を確認すること。","消防署の建物設備を点検すること。"],"answer":[3],"source":{"page":"p.6～9","title":"医療の質の評価"}},{"id":557,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"557【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 医療の質を評価する際に用いられる指標として適切なのはどれか。2つ選べ。","choices":["ストラクチャー（構造）","アウトカム（結果）","個人の勘","偶然の成功例","思い込みによる評価"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療の質の評価"}},{"id":558,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"558【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 ある消防本部で心肺停止傷病者に対する活動を検証した結果、自己心拍再開率（ROSC）が前年より向上していた。この指標は医療の質評価ではどれに該当するか。1つ選べ。","choices":["ストラクチャー（構造）","プロセス（過程）","アウトカム（結果）","ガイドライン","インフォームド・コンセント"],"answer":[3],"source":{"page":"p.6～9","title":"医療の質の評価"}},{"id":559,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"559【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療の質評価における「プロセス評価」として最も適切なのはどれか。1つ選べ。","choices":["病院の設備状況を評価すること。","傷病者の予後を評価すること。","救急隊がガイドラインどおりに活動したかを評価すること。","救急車の購入費を評価すること。","地域人口を調査すること。"],"answer":[3],"source":{"page":"p.6～9","title":"医療の質の評価"}},{"id":560,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"560【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 医療の質を継続的に向上させるために重要な取り組みはどれか。2つ選べ。","choices":["評価結果を次の改善へ活用する。","客観的な指標を用いて検証する。","問題点があっても改善を行わない。","個人の経験のみで評価する。","データを収集せず活動を継続する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療の質の評価・継続的改善"}},{"id":561,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"561【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療の質評価における「ストラクチャー（構造）」評価として最も適切なのはどれか。1つ選べ。","choices":["傷病者の社会復帰率を評価する。","CPR実施率を評価する。","救急車や医療機器、人員配置などの体制を評価する。","ガイドライン遵守率を評価する。","搬送後の生存率を評価する。"],"answer":[3],"source":{"page":"p.6～9","title":"医療の質の評価"}},{"id":562,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"562【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 医療の質を評価する「ドナベディアンモデル」の評価項目として適切なのはどれか。2つ選べ。","choices":["ストラクチャー（構造）","プロセス（過程）","リスク（危険）","コスト（費用）","モラル（倫理）"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療の質の評価"}},{"id":563,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"563【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 消防本部が救急活動の質を評価するため、救急車への資器材配置、救急救命士の配置人数、教育体制を調査した。この評価はドナベディアンモデルのどれに該当するか。1つ選べ。","choices":["ストラクチャー（構造）","プロセス（過程）","アウトカム（結果）","インシデント評価","リスク評価"],"answer":[1],"source":{"page":"p.6～9","title":"医療の質の評価"}},{"id":564,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"564【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 EBMを実践する際、科学的根拠に加えて考慮すべきものとして最も適切なのはどれか。1つ選べ。","choices":["医療従事者の思い込みのみ","傷病者の価値観や希望","地域の慣例のみ","経験年数のみ","多数決による意見"],"answer":[2],"source":{"page":"p.6～9","title":"EBM"}},{"id":565,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"565【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急活動後の事後検証（デブリーフィング）の目的として適切なのはどれか。2つ選べ。","choices":["活動内容を振り返り改善につなげる。","良かった点・改善点を共有する。","個人の責任だけを追及する。","隊員を評価して順位を決める。","問題点を隠して活動を終了する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療の質の向上・デブリーフィング・PDCA"}},{"id":566,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"566【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 救急活動の質を維持・向上させるために行う「デブリーフィング」の実施時期として最も適切なのはどれか。1つ選べ。","choices":["出動前","災害対応中","活動終了後できるだけ早い時期","年度末のみ","国家試験前"],"answer":[3],"source":{"page":"p.6～9","title":"デブリーフィング・医療の質の向上"}},{"id":567,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"567【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 効果的なデブリーフィングの進め方として適切なのはどれか。2つ選べ。","choices":["良かった点と改善点を共有する。","客観的事実に基づいて振り返る。","個人を非難することを目的とする。","発言しづらい雰囲気を作る。","問題点を隠して終了する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"デブリーフィング・科学的思考"}},{"id":568,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"568【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊が心肺停止症例の活動後にデブリーフィングを実施した。隊員の一人が「今回は胸骨圧迫の中断時間が長かった」とデータを提示し、改善策を話し合った。このデブリーフィングで最も重視されているものはどれか。1つ選べ。","choices":["個人の責任追及","客観的データに基づく改善","隊員の勤務評価","出動件数の増加","搬送時間の短縮のみ"],"answer":[2],"source":{"page":"p.6～9","title":"デブリーフィング・PDCA"}},{"id":569,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"569【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 EBM（Evidence-Based Medicine）の実践において、科学的根拠の信頼性を判断するために最も重要なのはどれか。1つ選べ。","choices":["個人の経験年数","研究デザインや研究の質","発表された年だけ","著者の知名度","学会発表の有無のみ"],"answer":[2],"source":{"page":"p.6～9","title":"EBM・科学的根拠"}},{"id":570,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"570【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急救命士がEBMを実践するために必要な行動として適切なのはどれか。2つ選べ。","choices":["最新の医学的根拠を確認する。","得られたエビデンスを傷病者の状況に合わせて活用する。","すべての傷病者に同一の対応を行う。","科学的根拠より慣例を優先する。","一度学んだ知識を更新しない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"EBM・科学的思考・生涯学習"}},{"id":571,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"571【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療においてクリニカルガイドラインを活用する目的として最も適切なのはどれか。1つ選べ。","choices":["すべての傷病者に画一的な医療を提供するため。","科学的根拠に基づき、適切な医療判断を支援するため。","医療従事者の経験を不要とするため。","法律として強制するため。","傷病者の意思を考慮しないため。"],"answer":[2],"source":{"page":"p.6～9","title":"EBM・ガイドライン"}},{"id":572,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"572【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 クリニカルガイドラインの特徴として適切なのはどれか。2つ選べ。","choices":["科学的根拠をもとに作成される。","定期的に見直し・改訂される。","一度作成されたら改訂されない。","傷病者の状況に関係なく必ず同じ対応を行うことを求める。","個人の経験だけを基に作成される。"],"answer":[1,2],"source":{"page":"p.6～9","title":"EBM・ガイドライン"}},{"id":573,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"573【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊で最新ガイドラインに基づく胸骨圧迫方法へ変更する研修を実施した。ある隊員は「昔の方法でも問題なかった」と話したが、指導者は最新の科学的根拠を説明した。この対応として最も適切な考え方はどれか。1つ選べ。","choices":["慣例を最優先する。","最新の科学的根拠を踏まえて活動を見直す。","個人の経験だけで活動方法を決定する。","ガイドラインは参考にしない。","年齢が高い隊員の意見を優先する。"],"answer":[2],"source":{"page":"p.6～9","title":"EBM・ガイドライン"}},{"id":574,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"574【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療従事者が批判的思考（クリティカルシンキング）を行う目的として最も適切なのはどれか。1つ選べ。","choices":["他者の意見を否定するため。","根拠を検討し、より適切な判断を行うため。","経験のみを重視するため。","慣例を維持するため。","多数決で結論を決定するため。"],"answer":[2],"source":{"page":"p.6～9","title":"科学的思考・批判的思考"}},{"id":575,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"575【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 救急救命士が科学的思考を実践するために重要な姿勢として適切なのはどれか。2つ選べ。","choices":["新しい知見を積極的に学ぶ。","自己の活動を客観的に振り返る。","根拠がなくても従来の方法を継続する。","思い込みを優先して判断する。","一度学んだ知識は更新しない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"科学的思考・EBM・生涯学習"}},{"id":576,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"576【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療における「安全文化（Safety Culture）」として最も適切なのはどれか。1つ選べ。","choices":["医療事故を隠す文化である。","個人の責任追及を最優先する文化である。","組織全体で安全性を高め、事故防止に取り組む文化である。","医療従事者の経験のみを重視する文化である。","管理者のみが安全対策を考える文化である。"],"answer":[3],"source":{"page":"p.6～9","title":"医療安全・安全文化"}},{"id":577,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"577【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 医療安全文化を醸成するために重要な取り組みはどれか。2つ選べ。","choices":["インシデントを共有し再発防止につなげる。","職種間で情報共有を行う。","ミスを隠すよう指導する。","個人を責めることを最優先する。","問題が起きても検証を行わない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療安全・安全文化"}},{"id":578,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"578【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊で薬剤準備時に投与前に誤りへ気付いた。隊では原因を分析し、再発防止策を全隊へ周知した。この取り組みの目的として最も適切なのはどれか。1つ選べ。","choices":["当事者を処分するため。","責任者を決めるため。","組織全体の安全性を向上させるため。","出動件数を増やすため。","活動時間を短縮するため。"],"answer":[3],"source":{"page":"p.6～9","title":"医療安全・安全文化・PDCA"}},{"id":579,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"579【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 ヒューマンエラーを減らすために最も有効な方法はどれか。1つ選べ。","choices":["個人の注意力だけに頼る。","チェックリストやダブルチェックなどの仕組みを活用する。","経験年数の長い職員だけで活動する。","ミスは報告しない。","問題が起きても改善しない。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・ヒューマンエラー対策"}},{"id":580,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"580【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 医療安全を向上させるために救急救命士が実践すべきものはどれか。2つ選べ。","choices":["インシデントを積極的に報告する。","活動内容を分析し改善策を実施する。","ミスを隠すことを優先する。","問題点の共有を避ける。","エラーの原因を検証せず活動を継続する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療安全・インシデント・継続的改善"}},{"id":581,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"581【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療安全における「インシデント」の説明として最も適切なのはどれか。1つ選べ。","choices":["傷病者に実際の被害が発生した事象のみをいう。","偶然により被害を免れた事象や、被害が発生しなかった事象をいう。","医療機器の故障のみをいう。","災害現場で発生した事故のみをいう。","医療従事者の体調不良のみをいう。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・インシデント"}},{"id":582,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"582【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 インシデントレポートを提出する目的として適切なのはどれか。2つ選べ。","choices":["再発防止策を検討する。","組織全体で情報共有を行う。","個人を処分することを目的とする。","責任追及だけを目的とする。","報告内容を隠すことを目的とする。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療安全・インシデント"}},{"id":583,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"583【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊員が薬剤を準備した際、投与直前のダブルチェックで誤りに気付き、傷病者への投与は行われなかった。この事例として最も適切なのはどれか。1つ選べ。","choices":["医療事故","インシデント","合併症","医療過誤","不可抗力"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・インシデント・ダブルチェック"}},{"id":584,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"584【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 ヒューマンエラーへの対策として最も適切なのはどれか。1つ選べ。","choices":["エラーを起こした職員だけを教育する。","エラーが起こりにくい仕組みを構築する。","経験年数の長い職員だけで活動する。","エラーは個人の責任として処理する。","エラーの分析は不要である。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・ヒューマンエラー"}},{"id":585,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"585【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 組織として医療安全を推進するために重要な取り組みはどれか。2つ選べ。","choices":["インシデントを分析し改善策を立案する。","安全に関する教育・研修を継続して実施する。","エラーを報告しないよう指導する。","個人の経験だけで再発防止を行う。","問題が発生しても情報共有を行わない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療安全・安全文化・継続的改善"}},{"id":586,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"586【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療安全における「ダブルチェック」の目的として最も適切なのはどれか。1つ選べ。","choices":["活動時間を短縮するため。","ヒューマンエラーを防止するため。","責任者を決定するため。","経験年数の少ない職員を評価するため。","活動記録を簡略化するため。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・ダブルチェック"}},{"id":587,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"587【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 ダブルチェックを効果的に行うための方法として適切なのはどれか。2つ選べ。","choices":["お互いに独立して確認する。","確認内容を声に出して共有する。","一人が確認した内容をそのまま信じる。","忙しい場合は省略する。","経験年数の長い職員だけが確認する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療安全・ダブルチェック"}},{"id":588,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"588【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊がアドレナリン投与前に薬剤名・濃度・投与量を2名で確認した結果、薬剤の取り違えに気付いた。最も適切な評価はどれか。1つ選べ。","choices":["ダブルチェックが機能し、医療安全の向上につながった。","ダブルチェックは不要であった。","確認に時間を要したため実施すべきではない。","経験年数が長ければ確認は不要である。","一人で確認した方が効率的である。"],"answer":[1],"source":{"page":"p.6～9","title":"医療安全・ダブルチェック・ヒューマンエラー"}},{"id":589,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"589【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療安全において、ヒューマンエラーの発生を減らすために最も重要な考え方はどれか。1つ選べ。","choices":["エラーは個人の能力不足だけが原因である。","エラーが起こりにくい仕組みを構築する。","エラーは報告しない方がよい。","ベテラン職員だけで活動する。","マニュアルは必要ない。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・ヒューマンエラー"}},{"id":590,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"590【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 安全文化が根付いている組織の特徴として適切なのはどれか。2つ選べ。","choices":["インシデントを共有し、再発防止に活用する。","職員が安心して報告できる環境がある。","エラーは必ず個人の責任として処分する。","問題点を隠すことを優先する。","失敗事例の共有は行わない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療安全・安全文化"}},{"id":591,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"591【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療安全における「リスクマネジメント」の目的として最も適切なのはどれか。1つ選べ。","choices":["医療事故が発生した後の責任を追及すること。","医療事故やインシデントを未然に防止し、安全な医療を提供すること。","医療費を削減すること。","医療従事者の勤務時間を短縮すること。","医療機器の購入費を削減すること。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・リスクマネジメント"}},{"id":592,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"592【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 リスクマネジメントを推進するために重要な取り組みはどれか。2つ選べ。","choices":["インシデント情報を分析する。","危険因子を早期に把握する。","エラーを隠すよう指導する。","問題が発生しても検証しない。","報告者を責めることを優先する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"リスクマネジメント・医療安全"}},{"id":593,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"593【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊で薬剤の保管場所が分かりにくく、過去にも取り違えそうになった事例が複数報告されていた。そこで保管方法を変更し、ラベル表示を見直した。この取り組みとして最も適切なのはどれか。1つ選べ。","choices":["個人の注意力向上のみを目的とした対策","リスクマネジメントによる再発防止策","責任者を処分する対策","出動時間短縮の対策","医療費削減対策"],"answer":[2],"source":{"page":"p.6～9","title":"リスクマネジメント・医療安全"}},{"id":594,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"594【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療安全における「再発防止策」の立案で最も重要なのはどれか。1つ選べ。","choices":["当事者だけを教育すること。","原因を分析し、仕組みを改善すること。","エラーを報告しないこと。","問題を個人の能力だけで判断すること。","同じ方法を継続すること。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・再発防止"}},{"id":595,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"595【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 組織的なリスクマネジメントとして適切なのはどれか。2つ選べ。","choices":["インシデント情報を継続的に収集する。","改善策の効果を評価する。","エラーは個人の責任のみと考える。","問題点を共有しない。","インシデント報告制度を廃止する。"],"answer":[1,2],"source":{"page":"p.6～9","title":"リスクマネジメント・PDCA・医療安全"}},{"id":596,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"596【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 医療安全活動において、インシデント情報を収集・分析する最大の目的として最も適切なのはどれか。1つ選べ。","choices":["当事者の責任を追及するため。","同様の事例の再発を防止するため。","出動件数を増やすため。","勤務評価の資料とするため。","医療費を削減するため。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・インシデント分析"}},{"id":597,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択2答","question":"597【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択2答 問題 医療安全において「組織で事故を防ぐ」という考え方に基づく取り組みとして適切なのはどれか。2つ選べ。","choices":["マニュアルを定期的に見直す。","職員教育・研修を継続する。","エラーは個人の責任だけで処理する。","インシデント情報を共有しない。","改善策の効果を検証しない。"],"answer":[1,2],"source":{"page":"p.6～9","title":"医療安全・継続的改善"}},{"id":598,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"症例","question":"598【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：症例問題・5択1答 問題 救急隊でインシデントが発生した。隊長は当事者への聞き取りだけでなく、業務手順や資器材配置、教育体制なども確認した。この対応として最も適切な考え方はどれか。1つ選べ。","choices":["個人の責任だけを追及する。","システム全体を分析し、根本原因を把握する。","同様の事例は偶然と考える。","原因分析は不要である。","当事者だけを再教育すれば十分である。"],"answer":[2],"source":{"page":"p.6～9","title":"医療安全・リスクマネジメント・根本原因分析"}},{"id":599,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"一般","type":"5択1答","question":"599【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：一般 形式：5択1答 問題 安全で質の高い救急活動を継続するために最も重要な姿勢はどれか。1つ選べ。","choices":["慣例のみを信頼する。","客観的な評価と継続的な改善を繰り返す。","一度決めた方法は変更しない。","問題点は報告しない。","個人の経験だけを根拠とする。"],"answer":[2],"source":{"page":"p.6～9","title":"PDCAサイクル・継続的改善"}},{"id":600,"chapter":"第Ⅰ編 第1章 社会と医療","difficulty":"難問","type":"5択2答","question":"600【正式版 Ver1.1】 分野：第Ⅰ編 第1章 社会と医療 難易度：難問 形式：5択2答 問題 第Ⅰ編 第1章「社会と医療」の内容を踏まえ、救急救命士に求められる基本姿勢として適切なのはどれか。2つ選べ。","choices":["科学的根拠に基づいて判断する。","傷病者の人格と自己決定を尊重する。","個人の経験のみを最優先する。","インシデントは報告しない。","最新の知見を学ぶ必要はない。"],"answer":[1,2],"source":{"page":"p.4～15","title":"全人的医療・生命倫理・EBM・医療安全"}},{"id":601,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"601【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 WHO（世界保健機関）憲章における「健康」の定義として最も適切なのはどれか。1つ選べ。","choices":["疾病や障害がない状態である。","身体的に健康であればよい。","完全な身体的・精神的・社会的福祉の状態である。","医療を受けている状態である。","平均寿命が長い状態である。"],"answer":[3],"source":{"page":"p.18～19","title":"WHO憲章における健康"}},{"id":602,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"602【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 日本国憲法第25条に基づく健康に関する内容として適切なのはどれか。2つ選べ。","choices":["健康で文化的な最低限度の生活を営む権利を保障している。","国は社会福祉・社会保障・公衆衛生の向上に努めなければならない。","国民は医療を無料で受ける権利を有する。","国民は健康診断を受ける義務がある。","医療従事者のみを対象とした規定である。"],"answer":[1,2],"source":{"page":"p.19","title":"日本国憲法と健康"}},{"id":603,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"603【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 救急救命士を目指す学生が「救急救命士も日本国憲法第25条の理念を実現する職種である」と説明を受けた。この説明の根拠として最も適切なのはどれか。1つ選べ。","choices":["救急救命士は警察行政に属するため。","国民の健康の維持・増進に寄与する専門職であるため。","医療費を削減することのみを目的とするため。","医療事故を防止する業務だけを担当するため。","保険制度を運営する立場にあるため。"],"answer":[2],"source":{"page":"p.19","title":"日本国憲法と健康・救急救命士の役割"}},{"id":604,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"604【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 公衆衛生の目的として最も適切なのはどれか。1つ選べ。","choices":["個々の患者のみを対象として治療を行うこと。","地域社会全体の健康を維持・増進し、疾病を予防すること。","医療費を削減することのみを目的とすること。","医療従事者の資格を管理すること。","病院経営を支援すること。"],"answer":[2],"source":{"page":"p.19","title":"公衆衛生"}},{"id":605,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"605【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 公衆衛生に関する記述として適切なのはどれか。2つ選べ。","choices":["疾病予防は公衆衛生の重要な目的である。","健康増進は公衆衛生の重要な役割である。","公衆衛生は病院内の診療のみを対象とする。","公衆衛生は個人の治療だけを目的とする。","公衆衛生活動に行政は関与しない。"],"answer":[1,2],"source":{"page":"p.19～20","title":"公衆衛生"}},{"id":606,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"606【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 健康日本21（第三次）の目的として最も適切なのはどれか。1つ選べ。","choices":["医療費の削減のみを目的とする。","国民の健康寿命の延伸と健康格差の縮小を目指す。","病院数を増加させることを目的とする。","高齢者のみを対象とした施策である。","医療従事者の資格制度を定めるものである。"],"answer":[2],"source":{"page":"p.20～21","title":"健康日本21"}},{"id":607,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"607【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 健康日本21（第三次）の基本的な考え方として適切なのはどれか。2つ選べ。","choices":["健康寿命の延伸を図る。","健康格差の縮小を目指す。","医療機関の民営化を推進する。","救急医療だけを充実させる。","病気の治療のみを重視する。"],"answer":[1,2],"source":{"page":"p.20～21","title":"健康日本21"}},{"id":608,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"608【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 地域住民を対象とした健康教室で、保健師が食生活改善や運動習慣の重要性について講義を行った。この活動として最も適切なのはどれか。1つ選べ。","choices":["二次予防","健康増進・一次予防","三次予防","高度専門医療","災害医療"],"answer":[2],"source":{"page":"p.20～21","title":"健康日本21・健康増進"}},{"id":609,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"609【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 地域住民の健康づくりを推進する市町村の中核施設として最も適切なのはどれか。1つ選べ。","choices":["保健センター","地方裁判所","消防署","医師会","社会保険診療報酬支払基金"],"answer":[1],"source":{"page":"p.21～22","title":"市町村保健センター"}},{"id":610,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"610【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 市町村保健センターが実施する業務として適切なのはどれか。2つ選べ。","choices":["健康相談","健康教育","救急車の配備計画","救急救命士免許の交付","気象警報の発表"],"answer":[1,2],"source":{"page":"p.21～22","title":"市町村保健センター"}},{"id":611,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"611【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 地域保健法に基づき、広域的・専門的な地域保健対策を担う機関として最も適切なのはどれか。1つ選べ。","choices":["保健所","市町村保健センター","消防署","医療安全支援センター","地方裁判所"],"answer":[1],"source":{"page":"p.22～23","title":"保健所"}},{"id":612,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"612【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 保健所の業務として適切なのはどれか。2つ選べ。","choices":["感染症対策","食品衛生に関する監視・指導","救急車の運行管理","救急救命士国家試験の実施","消防車両の整備"],"answer":[1,2],"source":{"page":"p.22～23","title":"保健所の業務"}},{"id":613,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"613【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 ある地域で感染症患者が急増したため、積極的疫学調査や濃厚接触者への対応が開始された。この中心的役割を担う行政機関として最も適切なのはどれか。1つ選べ。","choices":["保健所","市町村保健センター","消防本部","医師会","日本赤十字社"],"answer":[1],"source":{"page":"p.22～23","title":"保健所・感染症対策"}},{"id":614,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"614【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 国際保健分野で、国際連合（UN）の専門機関として世界の公衆衛生の向上を目的に活動している機関はどれか。1つ選べ。","choices":["WHO（世界保健機関）","ILO（国際労働機関）","JICA（国際協力機構）","OECD（経済協力開発機構）","日本医師会"],"answer":[1],"source":{"page":"p.23～24","title":"WHO"}},{"id":615,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"615【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 WHO（世界保健機関）の主な活動として適切なのはどれか。2つ選べ。","choices":["国際的な感染症対策の推進","各国の健康水準向上への支援","日本国内の消防行政の運営","日本の医療保険制度の運営","救急救命士国家試験の実施"],"answer":[1,2],"source":{"page":"p.23～24","title":"WHOの活動"}},{"id":616,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"616【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 UNICEF（国際連合児童基金）の主な活動として最も適切なのはどれか。1つ選べ。","choices":["世界の子どもの健康と福祉の向上を支援する。","国際的な金融政策を決定する。","労働条件の改善のみを目的とする。","世界各国の消防行政を統括する。","医療保険制度を運営する。"],"answer":[1],"source":{"page":"p.24","title":"UNICEF"}},{"id":617,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"617【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 UNICEF（国際連合児童基金）の活動として適切なのはどれか。2つ選べ。","choices":["母子保健の推進","子どもの栄養改善や予防接種支援","日本の介護保険制度の運営","救急救命士免許の交付","消防行政の監督"],"answer":[1,2],"source":{"page":"p.24","title":"UNICEFの活動"}},{"id":618,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"618【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 発展途上国で乳幼児の感染症予防のためにワクチン接種事業が実施されている。この事業をWHOと連携して支援する代表的な国際機関として最も適切なのはどれか。1つ選べ。","choices":["UNICEF","OECD","IMF","日本赤十字社","消防庁"],"answer":[1],"source":{"page":"p.24","title":"WHO・UNICEF"}},{"id":619,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"619【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 日本の人口動態統計で「平均寿命」が最も長い性別はどれか。1つ選べ。","choices":["男性","女性","男女で同じ","年によって必ず逆転する","統計は作成されていない"],"answer":[2],"source":{"page":"p.24～25","title":"人口動態・平均寿命"}},{"id":620,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"620【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 平均寿命と健康寿命に関する記述として適切なのはどれか。2つ選べ。","choices":["平均寿命は0歳時点の平均余命を示す。","健康寿命は健康上の問題なく日常生活を送れる期間を示す。","平均寿命と健康寿命は常に同じである。","健康寿命は医療機関で過ごす期間を示す。","平均寿命は医療費の総額を表す。"],"answer":[1,2],"source":{"page":"p.24～25","title":"平均寿命・健康寿命"}},{"id":621,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"621【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 日本の人口構造の変化として最も適切なのはどれか。1つ選べ。","choices":["年少人口が増加し続けている。","生産年齢人口が増加し続けている。","少子高齢化が進行している。","高齢者人口は減少している。","総人口は急激に増加している。"],"answer":[3],"source":{"page":"p.25～26","title":"人口構造・少子高齢化"}},{"id":622,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"622【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 少子高齢化が社会へ及ぼす影響として適切なのはどれか。2つ選べ。","choices":["医療・介護需要の増加","生産年齢人口の減少","高齢者人口の減少","年金制度が不要になる","出生数の増加"],"answer":[1,2],"source":{"page":"p.25～26","title":"少子高齢化"}},{"id":623,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"623【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 ある自治体では高齢者のみの世帯が増加していることから、在宅医療や介護サービスの充実が求められている。この背景として最も適切なのはどれか。1つ選べ。","choices":["少子高齢化の進行","感染症の流行","医療従事者の増加","出生率の上昇","若年人口の急増"],"answer":[1],"source":{"page":"p.25～26","title":"少子高齢化・在宅医療"}},{"id":624,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"624【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 日本の人口統計において「人口ピラミッド」が示すものとして最も適切なのはどれか。1つ選べ。","choices":["地域別の医療機関数","年齢・性別ごとの人口構成","死因別死亡数","医療費の推移","出生率のみ"],"answer":[2],"source":{"page":"p.25～26","title":"人口ピラミッド"}},{"id":625,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"625【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 日本の人口動態に関する記述として適切なのはどれか。2つ選べ。","choices":["少子高齢化が進行している。","生産年齢人口は減少傾向にある。","高齢者人口は減少している。","出生数は増加傾向にある。","総人口は長期的に増加傾向にある。"],"answer":[1,2],"source":{"page":"p.25～26","title":"人口動態・少子高齢化"}},{"id":626,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"626【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 人口動態統計に含まれる事項として最も適切なのはどれか。1つ選べ。","choices":["出生・死亡・婚姻・離婚などの人口動態","全国の病院数","救急車の出動件数","医療従事者数のみ","医療費総額のみ"],"answer":[1],"source":{"page":"p.25～27","title":"人口動態統計"}},{"id":627,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"627【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 人口動態統計で把握される事項として適切なのはどれか。2つ選べ。","choices":["出生数","死亡数","全国の救急出動件数","医療機関の経営状況","医療機器の販売台数"],"answer":[1,2],"source":{"page":"p.25～27","title":"人口動態統計"}},{"id":628,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"628【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 ある自治体では人口動態統計をもとに、高齢化率の上昇と死亡数の増加が確認された。この統計を活用する主な目的として最も適切なのはどれか。1つ選べ。","choices":["地域の保健医療施策を立案するため。","消防車両の価格を決定するため。","病院の診療報酬を決定するため。","個人の資産を把握するため。","医療機器の販売数を調査するため。"],"answer":[1],"source":{"page":"p.25～27","title":"人口動態統計・地域保健"}},{"id":629,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"629【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 日本人の死因として長年上位を占めている疾患群はどれか。1つ選べ。","choices":["悪性新生物（がん）","熱中症","食中毒","骨折","喘息"],"answer":[1],"source":{"page":"p.27","title":"主要死因"}},{"id":630,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"630【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 日本の主要死因に関する記述として適切なのはどれか。2つ選べ。","choices":["悪性新生物（がん）は主要死因の一つである。","心疾患は主要死因の上位を占めている。","感染症が常に第1位の死因である。","外因死が最も多い死因である。","食中毒が主要死因の上位を占めている。"],"answer":[1,2],"source":{"page":"p.27","title":"主要死因"}},{"id":631,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"631【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 生活習慣病に分類される疾患として最も適切なのはどれか。1つ選べ。","choices":["高血圧症","虫垂炎","急性胃腸炎","骨折","急性虫垂炎"],"answer":[1],"source":{"page":"p.27～28","title":"生活習慣病"}},{"id":632,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"632【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 生活習慣病の発症リスクを高める生活習慣として適切なのはどれか。2つ選べ。","choices":["喫煙","運動不足","十分な睡眠","適正体重の維持","バランスの良い食事"],"answer":[1,2],"source":{"page":"p.27～28","title":"生活習慣病・危険因子"}},{"id":633,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"633【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 健康診断で高血圧と肥満を指摘された40歳男性に対し、保健師は生活習慣の改善を指導した。この指導の主な目的として最も適切なのはどれか。1つ選べ。","choices":["感染症の流行を防ぐため。","生活習慣病の発症・重症化を予防するため。","外傷を予防するため。","医療費を徴収するため。","救急搬送件数を増やすため。"],"answer":[2],"source":{"page":"p.27～28","title":"生活習慣病・健康増進"}},{"id":634,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"634【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 感染症の一次予防として最も適切なのはどれか。1つ選べ。","choices":["ワクチン接種","リハビリテーション","人工透析","がん手術","心臓カテーテル検査"],"answer":[1],"source":{"page":"p.28～29","title":"感染症・一次予防"}},{"id":635,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"635【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 感染症予防のために重要な対策として適切なのはどれか。2つ選べ。","choices":["手指衛生を徹底する。","予防接種を適切に受ける。","発熱時でも感染対策は不要である。","感染症患者との接触後も手洗いは不要である。","咳エチケットを守る必要はない。"],"answer":[1,2],"source":{"page":"p.28～29","title":"感染症予防・標準予防策"}},{"id":636,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"636【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 感染症法（感染症の予防及び感染症の患者に対する医療に関する法律）の目的として最も適切なのはどれか。1つ選べ。","choices":["医療費を削減すること。","感染症の発生予防とまん延防止を図り、公衆衛生の向上を目指すこと。","医療従事者の資格を管理すること。","医療機関の経営を支援すること。","救急車の配置を決定すること。"],"answer":[2],"source":{"page":"p.28～30","title":"感染症法"}},{"id":637,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"637【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 感染症のまん延防止対策として適切なのはどれか。2つ選べ。","choices":["感染症発生時に積極的疫学調査を行う。","標準予防策を実施する。","感染者情報を無条件で公開する。","手指衛生を省略する。","感染対策は医療機関のみが実施する。"],"answer":[1,2],"source":{"page":"p.28～30","title":"感染症対策"}},{"id":638,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"638【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 救急隊が高熱と発疹のある傷病者を搬送した。感染症が疑われたため、隊員は標準予防策を徹底し、搬送後に車内消毒を実施した。この対応の主な目的として最も適切なのはどれか。1つ選べ。","choices":["傷病者の医療費を削減するため。","二次感染を防止するため。","搬送時間を短縮するため。","医療機関の負担を減らすため。","救急車の維持費を削減するため。"],"answer":[2],"source":{"page":"p.28～30","title":"感染症対策・標準予防策"}},{"id":639,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"639【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療法に基づく医療提供体制の目的として最も適切なのはどれか。1つ選べ。","choices":["全国の医療費を一律に決定すること。","良質かつ適切な医療を効率的に提供する体制を確保すること。","医療従事者の給与を決定すること。","医療機器の価格を決定すること。","救急車の配備基準を定めること。"],"answer":[2],"source":{"page":"p.30～31","title":"医療法"}},{"id":640,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"640【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 医療法に基づく医療提供体制に関する記述として適切なのはどれか。2つ選べ。","choices":["良質で適切な医療提供体制の確保を目的としている。","地域医療計画の整備が進められている。","医療法は救急救命士国家試験を実施する法律である。","医療法は消防行政を所管する法律である。","医療法は年金制度を定める法律である。"],"answer":[1,2],"source":{"page":"p.30～31","title":"医療法・医療提供体制"}},{"id":641,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"641【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療計画で設定される「二次医療圏」の役割として最も適切なのはどれか。1つ選べ。","choices":["高度専門医療のみを提供する区域である。","一般的な入院医療を提供する区域である。","全国規模の医療行政を行う区域である。","消防本部の管轄区域を示すものである。","医療保険の運営区域である。"],"answer":[2],"source":{"page":"p.31～32","title":"医療圏"}},{"id":642,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"642【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 医療計画における医療圏に関する記述として適切なのはどれか。2つ選べ。","choices":["一次医療圏は日常的な外来診療を主に担う。","三次医療圏は高度・特殊専門医療を担う。","二次医療圏は予防接種のみを担当する。","三次医療圏は介護保険を運営する区域である。","一次医療圏は消防行政の区域を示す。"],"answer":[1,2],"source":{"page":"p.31～32","title":"医療圏"}},{"id":643,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"643【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 重症熱傷傷病者が発生し、地域では対応が困難と判断されたため、高度救命救急センターへの搬送が決定された。この医療機関が位置付けられる医療圏として最も適切なのはどれか。1つ選べ。","choices":["一次医療圏","二次医療圏","三次医療圏","市町村医療圏","保健所管轄区域"],"answer":[3],"source":{"page":"p.31～32","title":"三次医療圏・高度専門医療"}},{"id":644,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"644【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療計画で重点的に整備される「5疾病」に含まれるものはどれか。1つ選べ。","choices":["糖尿病","虫垂炎","気胸","胃潰瘍","尿路結石"],"answer":[1],"source":{"page":"p.32～33","title":"5疾病"}},{"id":645,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"645【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 医療計画で定められている「5疾病」に含まれるものはどれか。2つ選べ。","choices":["がん（悪性新生物）","脳卒中","肺炎","骨粗鬆症","急性虫垂炎"],"answer":[1,2],"source":{"page":"p.32～33","title":"5疾病"}},{"id":646,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"646【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療計画で重点的に整備される「6事業」に含まれるものとして最も適切なのはどれか。1つ選べ。","choices":["救急医療","学校保健","産業保健","スポーツ医学","美容医療"],"answer":[1],"source":{"page":"p.33～34","title":"6事業"}},{"id":647,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"647【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 医療計画における「6事業」に含まれるものはどれか。2つ選べ。","choices":["救急医療","災害医療","美容医療","スポーツ医学","産業保健"],"answer":[1,2],"source":{"page":"p.33～34","title":"6事業"}},{"id":648,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"648【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 大規模地震が発生し、多数の傷病者が発生した。都道府県は医療計画に基づき災害拠点病院を中心とした医療体制を構築した。この対応が該当する「6事業」はどれか。1つ選べ。","choices":["救急医療","災害医療","へき地医療","周産期医療","小児医療"],"answer":[2],"source":{"page":"p.33～34","title":"6事業・災害医療"}},{"id":649,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"649【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療計画において「周産期医療」が対象とする主な時期として最も適切なのはどれか。1つ選べ。","choices":["小児期のみ","妊娠・分娩・新生児期","成人期のみ","高齢期のみ","学童期のみ"],"answer":[2],"source":{"page":"p.33～34","title":"6事業・周産期医療"}},{"id":650,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"650【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 医療計画における「6事業」に含まれるものとして適切なのはどれか。2つ選べ。","choices":["救急医療","周産期医療","美容医療","リハビリテーション医療","スポーツ医学"],"answer":[1,2],"source":{"page":"p.33～34","title":"6事業"}},{"id":651,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"651【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療計画における「在宅医療」の目的として最も適切なのはどれか。1つ選べ。","choices":["入院期間をできるだけ延長すること。","住み慣れた地域で継続した医療を受けられる体制を整備すること。","高度救命救急医療のみを提供すること。","病院外での医療を禁止すること。","医療費のみを削減すること。"],"answer":[2],"source":{"page":"p.34～35","title":"在宅医療"}},{"id":652,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"652【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 在宅医療に関する記述として適切なのはどれか。2つ選べ。","choices":["多職種が連携して支援を行う。","地域包括ケアシステムと密接に関係する。","医師のみで実施される医療である。","病院でしか提供できない。","高齢者は対象外である。"],"answer":[1,2],"source":{"page":"p.34～35","title":"在宅医療・地域包括ケア"}},{"id":653,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"653【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 85歳女性が退院後、自宅で訪問診療・訪問看護・訪問リハビリテーションを受けながら生活している。この医療提供体制として最も適切なのはどれか。1つ選べ。","choices":["災害医療","在宅医療","三次救急医療","周産期医療","学校保健"],"answer":[2],"source":{"page":"p.34～35","title":"在宅医療"}},{"id":654,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"654【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 地域包括ケアシステムの構成要素として最も適切なのはどれか。1つ選べ。","choices":["医療・介護・予防・住まい・生活支援","医療・教育・消防・警察・司法","医療・税制・外交・防衛・金融","医療・農業・工業・商業・観光","医療・交通・通信・電力・水道"],"answer":[1],"source":{"page":"p.34～35","title":"地域包括ケアシステム"}},{"id":655,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"655【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 地域包括ケアシステムの目的として適切なのはどれか。2つ選べ。","choices":["高齢者が住み慣れた地域で生活を継続できるよう支援する。","医療・介護・福祉などの多職種連携を推進する。","すべての高齢者を病院へ入院させることを目的とする。","医療のみで生活を支援する。","救急医療だけを充実させることを目的とする。"],"answer":[1,2],"source":{"page":"p.34～35","title":"地域包括ケアシステム"}},{"id":656,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"656【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療法に規定される医療従事者に該当する職種として最も適切なのはどれか。1つ選べ。","choices":["救急救命士","医師","消防吏員","救急隊長","救助隊員"],"answer":[2],"source":{"page":"p.35～36","title":"医療従事者"}},{"id":657,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"657【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 医療従事者に該当する職種として適切なのはどれか。2つ選べ。","choices":["医師","看護師","消防団員","警察官","救助隊員"],"answer":[1,2],"source":{"page":"p.35～36","title":"医療従事者"}},{"id":658,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"658【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 退院後の傷病者について、医師、看護師、薬剤師、理学療法士、ケアマネジャーなどが情報共有し、継続的な支援を行うこととなった。このような支援体制として最も適切なのはどれか。1つ選べ。","choices":["多職種連携","一次救命処置","医療圏の再編","災害医療","トリアージ"],"answer":[1],"source":{"page":"p.35～36","title":"医療従事者・多職種連携"}},{"id":659,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"659【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 社会保障制度の目的として最も適切なのはどれか。1つ選べ。","choices":["国民の生活の安定と福祉の向上を図ること。","医療機関の利益を確保すること。","医療費のみを削減すること。","税収を増加させること。","救急車の運用を管理すること。"],"answer":[1],"source":{"page":"p.36～37","title":"社会保障制度"}},{"id":660,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"660【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 日本の社会保障制度を構成するものとして適切なのはどれか。2つ選べ。","choices":["社会保険","公的扶助","株式市場","金融政策","刑事司法制度"],"answer":[1,2],"source":{"page":"p.36～37","title":"社会保障制度"}},{"id":661,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"661【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 日本の医療保険制度の特徴として最も適切なのはどれか。1つ選べ。","choices":["国民皆保険制度を採用している。","医療保険は民間保険のみで構成される。","高齢者のみが加入できる。","医療費は全額自己負担である。","加入は任意である。"],"answer":[1],"source":{"page":"p.37～38","title":"医療保険制度"}},{"id":662,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"662【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 日本の公的医療保険制度に関する記述として適切なのはどれか。2つ選べ。","choices":["国民皆保険制度を採用している。","被保険者は一定割合の自己負担で医療を受ける。","医療費は全額自己負担が原則である。","公的医療保険は高齢者のみが加入する制度である。","医療保険は民間保険のみで構成されている。"],"answer":[1,2],"source":{"page":"p.37～38","title":"医療保険制度"}},{"id":663,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"663【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 会社員が勤務先を通じて加入している公的医療保険により、一定割合の自己負担で外来診療を受けた。この制度の基本的な目的として最も適切なのはどれか。1つ選べ。","choices":["医療費負担を社会全体で支え合うこと。","医療機関の利益を増やすこと。","医療費を全額自己負担とすること。","民間保険への加入を促進すること。","医療機関数を増やすこと。"],"answer":[1],"source":{"page":"p.37～38","title":"医療保険制度"}},{"id":664,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"664【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 介護保険制度の対象として最も適切なのはどれか。1つ選べ。","choices":["要介護・要支援状態となった高齢者等","小学生のみ","医療従事者のみ","救急隊員のみ","妊婦のみ"],"answer":[1],"source":{"page":"p.38～39","title":"介護保険制度"}},{"id":665,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"665【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 介護保険制度に関する記述として適切なのはどれか。2つ選べ。","choices":["市町村が保険者である。","要介護認定に基づいて介護サービスを利用する。","国だけが保険者である。","医療保険と同一制度である。","介護認定を受けなくても、すべての介護サービスを利用できる。"],"answer":[1,2],"source":{"page":"p.38～39","title":"介護保険制度"}},{"id":666,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"666【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 介護保険制度の保険者として最も適切なのはどれか。1つ選べ。","choices":["国","都道府県","市町村および特別区","医療機関","社会福祉協議会"],"answer":[3],"source":{"page":"p.38～39","title":"介護保険制度"}},{"id":667,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"667【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 介護保険制度におけるサービスとして適切なのはどれか。2つ選べ。","choices":["訪問介護","通所介護（デイサービス）","救急搬送","救命処置","医師国家試験の実施"],"answer":[1,2],"source":{"page":"p.38～39","title":"介護保険サービス"}},{"id":668,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"668【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 82歳男性が脳梗塞後遺症のため要介護認定を受け、自宅で訪問介護や通所介護を利用することになった。これらのサービスを利用する制度として最も適切なのはどれか。1つ選べ。","choices":["医療保険制度","介護保険制度","生活保護制度","年金制度","労働者災害補償保険制度"],"answer":[2],"source":{"page":"p.38～39","title":"介護保険制度"}},{"id":669,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"669【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 国民年金や厚生年金が含まれる社会保障制度はどれか。1つ選べ。","choices":["年金制度","医療保険制度","介護保険制度","公的扶助","地域保健制度"],"answer":[1],"source":{"page":"p.39～40","title":"年金制度"}},{"id":670,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"670【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 日本の公的年金制度に関する記述として適切なのはどれか。2つ選べ。","choices":["国民年金は公的年金制度の一つである。","厚生年金は会社員などが加入する公的年金制度である。","公的年金制度は介護サービスのみを目的とする。","年金制度は医療保険制度と同一制度である。","年金制度は民間保険のみで構成される。"],"answer":[1,2],"source":{"page":"p.39～40","title":"年金制度"}},{"id":671,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"671【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 生活保護制度の目的として最も適切なのはどれか。1つ選べ。","choices":["国民全員に年金を支給すること。","健康で文化的な最低限度の生活を保障し、自立を支援すること。","医療機関の経営を支援すること。","医療保険制度を運営すること。","介護サービスのみを提供すること。"],"answer":[2],"source":{"page":"p.40～41","title":"生活保護制度"}},{"id":672,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"672【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 生活保護制度に関する記述として適切なのはどれか。2つ選べ。","choices":["生活に困窮する人を対象とする。","自立を助長することを目的としている。","会社員のみが対象となる。","医療保険加入者は利用できない。","年齢のみで受給が決定される。"],"answer":[1,2],"source":{"page":"p.40～41","title":"生活保護制度"}},{"id":673,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"673【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 70歳男性が病気のため収入を失い、資産もなく生活が困難となった。福祉事務所で相談した結果、最低限度の生活を保障する制度の利用を勧められた。この制度として最も適切なのはどれか。1つ選べ。","choices":["国民年金","生活保護制度","介護保険制度","雇用保険制度","医療保険制度"],"answer":[2],"source":{"page":"p.40～41","title":"生活保護制度"}},{"id":674,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"674【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 社会福祉制度の目的として最も適切なのはどれか。1つ選べ。","choices":["国民の福祉の増進を図ること。","医療費を一律に無料とすること。","医療従事者だけを支援すること。","医療保険制度のみを運営すること。","年金制度のみを管理すること。"],"answer":[1],"source":{"page":"p.41～42","title":"社会福祉"}},{"id":675,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"675【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 社会福祉に関する記述として適切なのはどれか。2つ選べ。","choices":["高齢者や障害者、児童などへの支援が含まれる。","地域で安心して生活できる環境づくりを目的としている。","社会福祉は医療保険制度のみを指す。","社会福祉は医療機関だけが担う。","社会福祉は病院内の診療だけを目的とする。"],"answer":[1,2],"source":{"page":"p.41～42","title":"社会福祉"}},{"id":676,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"676【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 社会保障制度を構成する「社会保険」に含まれるものとして最も適切なのはどれか。1つ選べ。","choices":["医療保険","義務教育","所得税制度","地方自治制度","消防行政"],"answer":[1],"source":{"page":"p.36～41","title":"社会保障制度・社会保険"}},{"id":677,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"677【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 社会保険に含まれる制度として適切なのはどれか。2つ選べ。","choices":["医療保険","年金保険","義務教育制度","裁判員制度","消防組織法"],"answer":[1,2],"source":{"page":"p.36～41","title":"社会保障制度・社会保険"}},{"id":678,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"678【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 65歳男性が脳梗塞後に要介護認定を受け、医療保険による治療と介護保険による在宅サービスを併用している。この状況から分かる社会保障制度の特徴として最も適切なのはどれか。1つ選べ。","choices":["必要に応じて複数の社会保障制度が連携して支援する。","医療保険だけですべての福祉サービスを提供する。","介護保険のみで医療を提供する。","公的制度は併用できない。","民間保険のみで支援する。"],"answer":[1],"source":{"page":"p.36～41","title":"社会保障制度・医療保険・介護保険"}},{"id":679,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"679【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 社会保障制度の4つの柱に含まれないものはどれか。1つ選べ。","choices":["社会保険","公的扶助","社会福祉","公衆衛生","消費税制度"],"answer":[5],"source":{"page":"p.36～42","title":"社会保障制度"}},{"id":680,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"680【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 社会保障制度全体に関する記述として適切なのはどれか。2つ選べ。","choices":["国民生活の安定と福祉の向上を目的としている。","社会保険・公的扶助・社会福祉・公衆衛生が相互に補完し合っている。","医療保険だけで社会保障制度は構成される。","高齢者のみを対象とした制度である。","社会保障制度は医療のみを対象としている。"],"answer":[1,2],"source":{"page":"p.36～42","title":"社会保障制度総論"}},{"id":681,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"681【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 社会保障制度における「公衆衛生」の目的として最も適切なのはどれか。1つ選べ。","choices":["国民全体の健康の保持・増進と疾病予防を図ること。","医療機関の利益を確保すること。","個人資産を管理すること。","年金給付のみを行うこと。","民間保険を普及させること。"],"answer":[1],"source":{"page":"p.19～20、p.36～42","title":"公衆衛生・社会保障制度"}},{"id":682,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"682【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 社会保障制度と公衆衛生の関係について適切なのはどれか。2つ選べ。","choices":["感染症対策は公衆衛生の重要な役割である。","健康増進活動は公衆衛生活動の一つである。","公衆衛生は病院内の診療だけを対象とする。","公衆衛生は社会保障制度とは無関係である。","公衆衛生は医療従事者だけを対象とする。"],"answer":[1,2],"source":{"page":"p.19～20、p.36～42","title":"公衆衛生・社会保障制度"}},{"id":683,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"683【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 市町村が住民を対象に健康診査や健康教育を実施し、生活習慣病の予防に取り組んでいる。この事業の主な目的として最も適切なのはどれか。1つ選べ。","choices":["地域住民の健康保持・増進を図ること。","医療費のみを削減すること。","医療機関数を増やすこと。","年金制度を運営すること。","救急搬送件数を増やすこと。"],"answer":[1],"source":{"page":"p.20～22","title":"健康増進・公衆衛生"}},{"id":684,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"684【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 第Ⅰ編第2章で扱う内容として最も適切なのはどれか。1つ選べ。","choices":["健康、地域保健、医療制度及び社会保障制度","解剖学と生理学のみ","救急処置のみ","薬理学のみ","災害医学のみ"],"answer":[1],"source":{"page":"p.18～42","title":"第2章総論"}},{"id":685,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"685【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 第Ⅰ編第2章「健康と社会保障」の内容として適切なのはどれか。2つ選べ。","choices":["地域住民の健康を支える保健・医療・福祉制度について学ぶ。","社会保障制度の基本的な仕組みについて学ぶ。","心肺蘇生法の実技手順のみを学ぶ。","心電図波形の判読のみを学ぶ。","気管挿管手技のみを学ぶ。"],"answer":[1,2],"source":{"page":"p.18～42","title":"第2章総論"}},{"id":686,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"686【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 医療計画で定める「5疾病6事業」の目的として最も適切なのはどれか。1つ選べ。","choices":["地域の実情に応じた医療提供体制を整備すること。","全国の医療機関数を同一にすること。","医療費を一律に削減すること。","医療従事者の給与を決定すること。","民間保険を普及させること。"],"answer":[1],"source":{"page":"p.31～34","title":"医療計画・5疾病6事業"}},{"id":687,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"687【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 医療計画に基づく地域医療提供体制として適切なのはどれか。2つ選べ。","choices":["地域の医療需要に応じて医療資源を配置する。","医療機関相互の機能分担と連携を推進する。","すべての医療機関が同じ機能を担う。","二次医療圏を廃止する。","救急医療は医療計画の対象外である。"],"answer":[1,2],"source":{"page":"p.31～34","title":"医療計画・医療圏"}},{"id":688,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"688【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 二次医療圏内では対応困難な重症外傷患者が発生し、高度専門医療機関へ搬送された。このように医療機関が役割分担して対応する主な目的として最も適切なのはどれか。1つ選べ。","choices":["効率的で質の高い医療提供体制を確保するため。","医療機関同士の競争を促進するため。","医療費のみを削減するため。","医療従事者数を減らすため。","病院数を減らすため。"],"answer":[1],"source":{"page":"p.30～34","title":"医療法・医療計画・医療圏"}},{"id":689,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"689【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 救急救命士が第Ⅰ編第2章「健康と社会保障」を学ぶ意義として最も適切なのはどれか。1つ選べ。","choices":["地域保健・医療・福祉制度を理解し、適切な救急活動につなげるため。","医療行為のみを学ぶため。","病院経営を行うため。","医療保険料を決定するため。","税制を運営するため。"],"answer":[1],"source":{"page":"p.18～42","title":"第2章総論"}},{"id":690,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"690【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 第Ⅰ編第2章の学習内容を踏まえ、救急救命士に求められる知識として適切なのはどれか。2つ選べ。","choices":["地域保健・医療制度・社会保障制度の基本を理解している。","地域の保健・医療・福祉関係者との連携を理解している。","心電図判読だけ理解していれば十分である。","救急処置だけ理解していれば地域保健の知識は不要である。","社会保障制度は救急活動とは無関係である。"],"answer":[1,2],"source":{"page":"p.18～42","title":"第2章総論・地域保健・社会保障"}},{"id":691,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"691【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 地域包括ケアシステムにおいて、救急救命士に期待される役割として最も適切なのはどれか。1つ選べ。","choices":["傷病者を医療・介護・福祉へ適切につなぐこと。","年金制度を運営すること。","医療保険料を決定すること。","介護認定を行うこと。","保健所長を任命すること。"],"answer":[1],"source":{"page":"p.34～42","title":"地域包括ケアシステム・社会保障"}},{"id":692,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"692【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 地域保健活動において救急救命士が理解しておくべき事項として適切なのはどれか。2つ選べ。","choices":["地域の医療提供体制","保健・医療・福祉機関との連携","病院経営のみ","税務制度","金融政策"],"answer":[1,2],"source":{"page":"p.18～42","title":"地域保健・地域医療連携"}},{"id":693,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"693【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 独居高齢者が軽症で救急要請した。救急救命士は搬送後も生活支援が必要と判断し、地域包括支援センターとの情報共有が必要と考えた。この判断の根拠として最も適切なのはどれか。1つ選べ。","choices":["地域で継続した生活を支えるため、多職種連携が重要である。","救急隊が介護認定を行うため。","救急隊が生活保護を決定するため。","医療保険料を決定するため。","年金額を決定するため。"],"answer":[1],"source":{"page":"p.34～42","title":"地域包括ケア・多職種連携"}},{"id":694,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"694【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 地域包括支援センターの主な役割として最も適切なのはどれか。1つ選べ。","choices":["高齢者の総合相談や介護予防を支援すること。","救急車の運行管理を行うこと。","医療保険制度を運営すること。","消防行政を統括すること。","医師免許を交付すること。"],"answer":[1],"source":{"page":"p.34～42","title":"地域包括ケアシステム・地域包括支援センター"}},{"id":695,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"695【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 第Ⅰ編第2章の内容を踏まえた救急救命士の活動として適切なのはどれか。2つ選べ。","choices":["地域の保健・医療・福祉制度を理解して活動する。","必要に応じて関係機関との連携を図る。","救急現場では地域資源を考慮する必要はない。","社会保障制度は搬送業務と無関係である。","保健所や地域包括支援センターとの連携は不要である。"],"answer":[1,2],"source":{"page":"p.18～42","title":"第2章総論・地域包括ケア・地域連携"}},{"id":696,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"696【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 救急救命士が地域保健・医療・福祉制度を理解することの意義として最も適切なのはどれか。1つ選べ。","choices":["傷病者に適切な医療・福祉資源を活用した支援を行うため。","医療機関の経営を行うため。","年金制度を管理するため。","医療保険料を決定するため。","税制を運営するため。"],"answer":[1],"source":{"page":"p.18～42","title":"第2章総論・地域保健・社会保障"}},{"id":697,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択2答","question":"697【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択2答 問題 第Ⅰ編第2章の内容から、救急救命士に求められる知識として適切なのはどれか。2つ選べ。","choices":["地域の保健・医療・福祉制度を理解している。","医療計画や地域医療連携の仕組みを理解している。","病院経営のみを理解していれば十分である。","社会保障制度は救急活動に関係しない。","医療制度を理解する必要はない。"],"answer":[1,2],"source":{"page":"p.18～42","title":"第2章総論・医療制度"}},{"id":698,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"症例","question":"698【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：症例問題・5択1答 問題 一人暮らしの高齢傷病者を救急搬送した際、退院後も継続した支援が必要と考えられた。救急救命士として最も重要な視点はどれか。1つ選べ。","choices":["医療・介護・福祉との連携を意識する。","救急搬送のみで役割は終了と考える。","社会背景は考慮しない。","医療機関以外との連携は不要である。","年金制度のみを確認する。"],"answer":[1],"source":{"page":"p.34～42","title":"地域包括ケア・多職種連携"}},{"id":699,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"一般","type":"5択1答","question":"699【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：一般 形式：5択1答 問題 第Ⅰ編第2章で学ぶ内容として最も適切なのはどれか。1つ選べ。","choices":["健康の概念、公衆衛生、医療制度及び社会保障制度を理解すること。","心電図判読のみを学ぶこと。","薬理学のみを学ぶこと。","外傷処置のみを学ぶこと。","解剖学のみを学ぶこと。"],"answer":[1],"source":{"page":"p.18～42","title":"第2章総論"}},{"id":700,"chapter":"第Ⅰ編 第2章 健康と社会保障","difficulty":"難問","type":"5択2答","question":"700【正式版 Ver1.1】 分野：第Ⅰ編 第2章 健康と社会保障 難易度：難問 形式：5択2答 問題 第Ⅰ編第2章「健康と社会保障」の内容を踏まえた救急救命士の基本姿勢として適切なのはどれか。2つ選べ。","choices":["地域の保健・医療・福祉制度を理解し、多職種と連携して活動する。","地域包括ケアの考え方を理解し、傷病者に応じた支援につなげる。","搬送だけを行えば十分であり、その後の地域連携は不要である。","社会保障制度は救急現場とは無関係である。","地域医療計画を理解する必要はない。"],"answer":[1,2],"source":{"page":"p.18～42","title":"第2章総論・地域包括ケア・地域医療連携"}},{"id":701,"level":"一般","category":"医の倫理","question":"医療倫理の基本原則として最も適切なのはどれか。1つ選べ。","choices":["傷病者の人格と尊厳を尊重すること。","医療者の利益を最優先すること。","医療費の削減を最優先すること。","医療情報を自由に公開すること。","家族の意思のみを優先すること。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～44","reference_topic":"医療倫理の基本","reference_accuracy":"chapter_range"},{"id":702,"level":"一般","category":"医の倫理","question":"医療倫理における基本的な考え方として適切なのはどれか。2つ選べ。","choices":["傷病者の人格を尊重する。","傷病者の利益を第一に考える。","医療者の都合を最優先する。","個人情報を制限なく第三者へ提供する。","傷病者の意思を無視してよい。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～44","reference_topic":"医療倫理","reference_accuracy":"chapter_range"},{"id":703,"level":"難問","category":"症例問題・医の倫理","question":"意識清明な傷病者が十分な説明を受けたうえで治療を拒否する意思を明確に示した。救急救命士がまず尊重すべきものとして最も適切なのはどれか。1つ選べ。","choices":["傷病者本人の自己決定権","医療者個人の価値観","家族の希望のみ","搬送時間の短縮","医療費の負担"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～45","reference_topic":"自己決定権","reference_accuracy":"chapter_range"},{"id":704,"level":"一般","category":"医の倫理","question":"インフォームド・コンセントについて最も適切なのはどれか。1つ選べ。","choices":["十分な説明を受けたうえで傷病者が同意することである。","家族だけが同意すればよい。","同意は不要である。","医療者が一方的に決定することである。","同意書への署名だけを意味する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P44～45","reference_topic":"インフォームド・コンセント","reference_accuracy":"chapter_range"},{"id":705,"level":"難問","category":"医の倫理","question":"インフォームド・コンセントに必要な要素として適切なのはどれか。2つ選べ。","choices":["傷病者への十分な説明","傷病者の自由意思による同意","医療者のみの判断","家族の同意だけで十分である","説明を省略して迅速に治療を開始すること"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P44～45","reference_topic":"インフォームド・コンセント","reference_accuracy":"chapter_range"},{"id":706,"level":"一般","category":"医の倫理","question":"守秘義務について最も適切な記述はどれか。1つ選べ。","choices":["業務上知り得た傷病者の秘密を正当な理由なく漏らしてはならない。","家族であれば必ず情報提供してよい。","同僚には自由に情報提供してよい。","SNSへの投稿は匿名であれば問題ない。","救急活動終了後は守秘義務はなくなる。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P45～46","reference_topic":"守秘義務・個人情報保護","reference_accuracy":"chapter_range"},{"id":707,"level":"一般","category":"医の倫理","question":"守秘義務に関する記述として適切なのはどれか。2つ選べ。","choices":["業務上知り得た秘密を保護する義務である。","個人情報は適切に管理しなければならない。","興味本位で知人に話してよい。","匿名であればSNSへ投稿してよい。","傷病者の情報は自由に持ち出してよい。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P45～46","reference_topic":"守秘義務・個人情報保護","reference_accuracy":"chapter_range"},{"id":708,"level":"難問","category":"症例問題・医の倫理","question":"救急活動後、隊員が傷病者の状況についてSNSへ投稿しようとした。他の隊員が制止した理由として最も適切なのはどれか。1つ選べ。","choices":["守秘義務および個人情報保護の観点から不適切であるため。","救急車内で撮影していないため。","上司の許可があれば自由に投稿できるため。","匿名であれば問題ないため。","投稿は勤務時間外であれば自由だから。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P45～46","reference_topic":"守秘義務・個人情報保護","reference_accuracy":"chapter_range"},{"id":709,"level":"一般","category":"医の倫理","question":"個人情報保護の観点から最も適切な対応はどれか。1つ選べ。","choices":["傷病者情報は必要最小限の範囲で利用・共有する。","傷病者の氏名を自由に公表する。","興味本位でカルテを閲覧する。","家族以外にも自由に情報提供する。","業務終了後は個人情報保護の対象外となる。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P45～46","reference_topic":"個人情報保護","reference_accuracy":"chapter_range"},{"id":710,"level":"難問","category":"医の倫理","question":"救急救命士が守秘義務を遵守するために必要な行動として適切なのはどれか。2つ選べ。","choices":["傷病者情報を適切に管理する。","業務上必要な範囲でのみ情報を共有する。","傷病者情報を私的な目的で利用する。","SNSで症例を公開する。","興味本位で傷病者情報を閲覧する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P45～46","reference_topic":"守秘義務・個人情報保護","reference_accuracy":"chapter_range"},{"id":711,"level":"一般","category":"医の倫理","question":"救急救命士が医療倫理を実践するうえで最も重要な姿勢はどれか。1つ選べ。","choices":["傷病者の尊厳を尊重し、公平に対応すること。","傷病者の社会的地位によって対応を変えること。","医療者の都合を最優先すること。","搬送時間のみを重視すること。","家族の希望だけを優先すること。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理・患者の尊厳","reference_accuracy":"chapter_range"},{"id":712,"level":"一般","category":"医の倫理","question":"救急救命士に求められる倫理的態度として適切なのはどれか。2つ選べ。","choices":["傷病者を公平に扱う。","傷病者の人格を尊重する。","私情によって対応を変える。","傷病者の秘密を自由に話す。","医療者の利益を優先する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理","reference_accuracy":"chapter_range"},{"id":713,"level":"難問","category":"症例問題・医の倫理","question":"外国人旅行者が救急要請し、言語が十分に通じなかった。救急救命士として最も倫理的に適切な対応はどれか。1つ選べ。","choices":["通訳や翻訳ツールなどを活用し、可能な限り本人の意思を確認する。","言葉が通じないため説明は不要である。","国籍を理由に対応を後回しにする。","家族がいないため処置を中止する。","搬送を断る。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"患者の尊厳・自己決定権・倫理的配慮","reference_accuracy":"chapter_range"},{"id":714,"level":"一般","category":"医の倫理","question":"医療倫理における「公正（Justice）」の考え方として最も適切なのはどれか。1つ選べ。","choices":["傷病者を差別することなく公平に医療を提供すること。","医療費の高い傷病者を優先すること。","社会的地位が高い人を優先すること。","若年者のみを優先すること。","医療従事者の利益を優先すること。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理の基本原則・公正","reference_accuracy":"chapter_range"},{"id":715,"level":"難問","category":"医の倫理","question":"医療倫理の基本原則として適切なのはどれか。2つ選べ。","choices":["傷病者の自己決定権を尊重する。","公平・公正な医療を提供する。","医療者の都合を最優先する。","個人情報を自由に公開する。","傷病者の人格を考慮する必要はない。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理の基本原則","reference_accuracy":"chapter_range"},{"id":716,"level":"一般","category":"医の倫理","question":"医療倫理における「善行（Beneficence）」の考え方として最も適切なのはどれか。1つ選べ。","choices":["傷病者にとって最善となるよう行動すること。","医療者の利益を優先すること。","家族の利益を最優先すること。","医療費を最小限にすること。","搬送時間のみを重視すること。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理の基本原則・善行","reference_accuracy":"chapter_range"},{"id":717,"level":"一般","category":"医の倫理","question":"医療倫理における「善行」の実践として適切なのはどれか。2つ選べ。","choices":["傷病者の利益を第一に考える。","傷病者にとって最善の医療を提供するよう努める。","医療者の都合だけで治療方針を決める。","社会的地位によって対応を変える。","個人的な感情で対応を決める。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理の基本原則・善行","reference_accuracy":"chapter_range"},{"id":718,"level":"難問","category":"症例問題・医の倫理","question":"意識障害のある傷病者が搬送され、本人から意思確認ができない状況であった。救急救命士として最も倫理的に適切な対応はどれか。1つ選べ。","choices":["傷病者の利益を最優先に考え、必要な救命処置を実施する。","本人の同意が得られないため、何も処置を行わない。","家族が到着するまで救命処置を中止する。","年齢のみを理由に処置内容を決める。","医療費を考慮して処置を控える。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"善行・患者利益の尊重","reference_accuracy":"chapter_range"},{"id":719,"level":"一般","category":"医の倫理","question":"医療倫理における「無危害（Non-maleficence）」の原則として最も適切なのはどれか。1つ選べ。","choices":["傷病者に不必要な危害を与えないよう努めること。","医療者の利益を最優先すること。","傷病者の希望は考慮しないこと。","医療費を最小限にすること。","家族の意思だけで医療を決定すること。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理の基本原則・無危害","reference_accuracy":"chapter_range"},{"id":720,"level":"難問","category":"医の倫理","question":"医療倫理の「無危害」の原則に基づく行動として適切なのはどれか。2つ選べ。","choices":["傷病者に不要な危険や苦痛を与えないよう配慮する。","医療行為による利益と危険性を十分に考慮する。","医療者の都合のみで処置内容を決定する。","傷病者への危険性は考慮しなくてよい。","必要な説明を省略して処置を行う。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理の基本原則・無危害","reference_accuracy":"chapter_range"},{"id":721,"level":"一般","category":"医の倫理","question":"救急救命士が倫理的に適切な判断を行うために最も重要なものはどれか。1つ選べ。","choices":["傷病者の権利と利益を最優先に考えること。","医療者自身の利益を優先すること。","家族の希望のみを優先すること。","搬送時間のみを重視すること。","医療費のみを考慮すること。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理の基本","reference_accuracy":"chapter_range"},{"id":722,"level":"一般","category":"医の倫理","question":"救急救命士の倫理的責務として適切なのはどれか。2つ選べ。","choices":["傷病者の尊厳を尊重する。","守秘義務を遵守する。","傷病者の個人情報を自由に公開する。","私情によって対応を変える。","社会的地位によって対応を変える。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理・守秘義務","reference_accuracy":"chapter_range"},{"id":723,"level":"難問","category":"症例問題・医の倫理","question":"心肺停止傷病者の蘇生中、家族から「もう処置をやめてください」と申し出があった。一方、傷病者本人の意思は確認できず、DNARなどの情報もない。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["現行の法令・プロトコルに従い、必要な救命処置を継続する。","家族の希望のみで直ちに蘇生を中止する。","家族の希望を無視して説明も行わない。","SNSで事例を相談する。","医療費を考慮して処置を中止する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"医療倫理・患者利益・自己決定","reference_accuracy":"chapter_range"},{"id":724,"level":"一般","category":"医の倫理","question":"傷病者の尊厳を守るための対応として最も適切なのはどれか。1つ選べ。","choices":["必要以上に傷病者の身体を露出しないよう配慮する。","傷病者の情報を周囲に聞こえるように話す。","傷病者の写真を個人のスマートフォンで撮影する。","傷病者の意思確認を行わず処置を進める。","傷病者の氏名を周囲へ公表する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"患者の尊厳・プライバシー","reference_accuracy":"chapter_range"},{"id":725,"level":"難問","category":"医の倫理","question":"医の倫理に基づく救急救命士の行動として適切なのはどれか。2つ選べ。","choices":["傷病者の自己決定権を可能な限り尊重する。","傷病者のプライバシー保護に努める。","個人的な価値観で処置内容を決定する。","傷病者の情報を興味本位で閲覧する。","傷病者の社会的地位によって対応を変える。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P43～46","reference_topic":"自己決定権・患者の尊厳・守秘義務","reference_accuracy":"chapter_range"},{"id":726,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士の接遇として最も適切なのはどれか。1つ選べ。","choices":["傷病者や家族に対して丁寧な言葉遣いと態度で接する。","傷病者への説明は不要である。","搬送を優先し、質問には一切答えない。","家族の不安を無視して活動する。","高圧的な態度で指示を行う。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～48","reference_topic":"接遇の基本","reference_accuracy":"chapter_range"},{"id":727,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士の接遇として適切なのはどれか。2つ選べ。","choices":["傷病者の話を傾聴する。","傷病者の不安に配慮する。","命令口調で話す。","相手の話を途中で遮る。","傷病者をあだ名で呼ぶ。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～48","reference_topic":"接遇・コミュニケーション","reference_accuracy":"chapter_range"},{"id":728,"level":"難問","category":"症例問題・救急救命士の活動と接遇","question":"高齢の傷病者が不安そうに「大丈夫でしょうか」と何度も質問している。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["安心できるよう丁寧に説明しながら処置・搬送を行う。","「静かにしてください」とだけ伝える。","質問には答えず処置のみを続ける。","家族だけに説明し本人には何も伝えない。","不安は無視して活動する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"傷病者対応・コミュニケーション","reference_accuracy":"chapter_range"},{"id":729,"level":"一般","category":"救急救命士の活動と接遇","question":"傷病者への説明として最も適切なのはどれか。1つ選べ。","choices":["実施する処置や搬送について分かりやすく説明する。","説明は不要である。","専門用語のみで説明する。","家族がいれば本人への説明は不要である。","傷病者の理解は確認しなくてよい。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"説明とコミュニケーション","reference_accuracy":"chapter_range"},{"id":730,"level":"難問","category":"救急救命士の活動と接遇","question":"救急救命士に求められるコミュニケーションとして適切なのはどれか。2つ選べ。","choices":["相手が理解しやすい言葉で説明する。","傷病者や家族の話を傾聴する。","相手の話を途中で遮る。","専門用語だけを用いて説明する。","不安への配慮は不要である。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"コミュニケーション・接遇","reference_accuracy":"chapter_range"},{"id":731,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者との信頼関係を築くために最も重要なのはどれか。1つ選べ。","choices":["誠実で丁寧な対応を心掛ける。","専門用語のみで説明する。","必要最小限しか会話をしない。","傷病者の質問には答えない。","搬送時間だけを優先する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"信頼関係の構築","reference_accuracy":"chapter_range"},{"id":732,"level":"一般","category":"救急救命士の活動と接遇","question":"傷病者や家族への対応として適切なのはどれか。2つ選べ。","choices":["不安な気持ちに配慮して対応する。","相手の立場に立って説明する。","感情的に対応する。","忙しいことを理由に説明を省略する。","傷病者の訴えを途中で遮る。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・コミュニケーション","reference_accuracy":"chapter_range"},{"id":733,"level":"難問","category":"症例問題・救急救命士の活動と接遇","question":"救急隊到着時、家族が取り乱して大声で救急隊に詰め寄ってきた。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["落ち着いた態度で家族の話を聞き、必要な説明を行いながら活動する。","家族を無視して活動を続ける。","家族を強い口調で制止する。","家族に責任があると指摘する。","家族への説明は病院に任せる。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"家族対応・コミュニケーション","reference_accuracy":"chapter_range"},{"id":734,"level":"一般","category":"救急救命士の活動と接遇","question":"救急現場で傷病者へ説明する際に最も適切なのはどれか。1つ選べ。","choices":["相手の理解度に応じて分かりやすい言葉で説明する。","医学用語だけで説明する。","時間がないため説明は不要である。","家族がいれば本人への説明は行わない。","相手が理解しているか確認する必要はない。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"説明・コミュニケーション","reference_accuracy":"chapter_range"},{"id":735,"level":"難問","category":"救急救命士の活動と接遇","question":"救急救命士が良好な接遇を実践するために重要なのはどれか。2つ選べ。","choices":["傷病者の尊厳に配慮する。","相手の話を最後まで傾聴する。","自分の都合を優先して対応する。","傷病者の質問には答えない。","感情的な態度で接する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・患者対応","reference_accuracy":"chapter_range"},{"id":736,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者へ接する際の態度として最も適切なのはどれか。1つ選べ。","choices":["相手の人格を尊重し、礼節をもって接する。","年齢によって態度を変える。","忙しいことを理由に説明を省略する。","一方的に話し、傷病者の訴
