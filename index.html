<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>救命士国家試験 学習ツール Ver5 1700問完成版</title>
<style>
:root {
  --bg:#f4f6f8; --card:#fff; --text:#1f2937; --muted:#64748b;
  --line:#e5e7eb; --main:#0f766e; --main2:#0d9488;
  --ok:#16a34a; --ng:#dc2626; --warn:#d97706; --blue:#2563eb;
}
* { box-sizing:border-box; }
body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.94); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
.header-inner { max-width:1100px; margin:auto; padding:14px 16px; display:flex; gap:12px; align-items:center; justify-content:space-between; }
h1 { font-size:20px; margin:0; }
.sub { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.5; }
.badges { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.badge { border:1px solid var(--line); border-radius:999px; padding:7px 10px; background:white; font-size:12px; color:#475569; font-weight:800; }
main { max-width:1100px; margin:0 auto; padding:16px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 12px 32px rgba(15,23,42,.06); margin-bottom:14px; }
.toolbar { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; margin-bottom:12px; align-items:end; }
.control label { display:block; font-size:12px; color:var(--muted); font-weight:900; margin:0 0 4px 2px; }
button, select, input { border:1px solid var(--line); background:white; border-radius:12px; padding:10px 12px; font-weight:800; color:#334155; }
button { cursor:pointer; }
button.primary { background:var(--main); color:white; border-color:var(--main); }
button.danger { background:#fef2f2; color:#b91c1c; border-color:#fecaca; }
button.blue { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
button.warn { background:#fffbeb; color:#92400e; border-color:#fde68a; }
select, input { width:100%; }
.meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.tag { font-size:12px; padding:5px 9px; border-radius:999px; background:#f1f5f9; color:#475569; font-weight:800; }
.q-title { font-size:18px; line-height:1.7; font-weight:900; margin:10px 0 14px; white-space:pre-wrap; }
.choices { display:flex; flex-direction:column; gap:10px; }
.choice { display:grid; grid-template-columns:46px 1fr auto; gap:10px; align-items:center; border:1px solid var(--line); border-radius:15px; padding:12px; background:white; cursor:pointer; }
.choice:hover { border-color:#99f6e4; }
.choice.selected { border-color:#14b8a6; background:#f0fdfa; }
.choice.correct { border-color:#22c55e; background:#f0fdf4; }
.choice.wrong { border-color:#ef4444; background:#fff1f2; }
.choiceMark { width:40px; height:40px; border-radius:12px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-weight:1000; background:#f8fafc; user-select:none; font-size:17px; }
.choice.correct .choiceMark { background:#dcfce7; color:#166534; border-color:#16a34a; }
.choice.wrong .choiceMark { background:#fee2e2; color:#991b1b; border-color:#ef4444; }
.choice-text { line-height:1.55; font-size:16px; }
.judge { font-weight:900; font-size:12px; padding:6px 8px; border-radius:999px; }
.judge.ok { color:#166534; background:#dcfce7; }
.judge.ng { color:#991b1b; background:#fee2e2; }
.actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; }
.result { margin-top:14px; padding:14px; border-radius:14px; border:1px solid var(--line); background:#f8fafc; font-weight:800; line-height:1.7; }
.result.ok { background:#f0fdf4; border-color:#bbf7d0; color:#14532d; }
.result.ng { background:#fef2f2; border-color:#fecaca; color:#7f1d1d; }
.reference { margin-top:10px; padding:12px 14px; border-radius:13px; background:#f8fafc; border:1px solid var(--line); color:#475569; line-height:1.6; }
.mark-buttons { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.mark-buttons button.active { outline:3px solid rgba(20,184,166,.25); border-color:var(--main2); }
.stats { margin-top:12px; display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
.stat { background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px; }
.stat .num { font-size:22px; font-weight:1000; }
.table-wrap { overflow:auto; border:1px solid var(--line); border-radius:14px; }
table { border-collapse:collapse; width:100%; background:white; }
th,td { padding:10px; border-bottom:1px solid var(--line); text-align:left; font-size:13px; white-space:nowrap; }
th { background:#f8fafc; color:#475569; }
.footer-controls { position:sticky; bottom:0; background:rgba(244,246,248,.92); backdrop-filter:blur(10px); border-top:1px solid var(--line); margin-top:24px; padding:12px 0; z-index:9; }
.footer-inner { max-width:1100px; margin:auto; padding:0 16px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.small { font-size:12px; color:var(--muted); line-height:1.7; }
.hidden { display:none !important; }
.progressbar { height:10px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin:8px 0 0; }
.progressbar > div { height:100%; background:linear-gradient(90deg,var(--main),var(--main2)); width:0%; }
@media (max-width:640px) {
  .header-inner { align-items:flex-start; flex-direction:column; }
  h1 { font-size:17px; }
  .card { padding:14px; border-radius:16px; }
  .toolbar { grid-template-columns:1fr 1fr; }
  .control.wide { grid-column:1 / -1; }
  .choice { grid-template-columns:44px 1fr; }
  .judge { grid-column:2; width:max-content; }
  .q-title { font-size:16px; }
  button, select, input { padding:9px 10px; }
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>救命士国家試験 学習ツール Ver5</h1>
      <div class="sub">1700問対応 ／ 分野別・範囲指定・復習・ブックマーク・200問本番モード ／ 選択肢ランダム化対応</div>
    </div>
    <div class="badges">
      <span class="badge" id="loadStatus">読込中</span>
      <span class="badge" id="countBadge">0問</span>
      <span class="badge" id="timerBadge">--:--</span>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <div class="toolbar">
      <div class="control">
        <label>モード</label>
        <select id="mode">
          <option value="practice">練習モード</option>
          <option value="test200">本番モード200問</option>
          <option value="review">復習モード</option>
          <option value="weak">苦手問題</option>
          <option value="bookmarked">ブックマーク</option>
        </select>
      </div>
      <div class="control">
        <label>難易度</label>
        <select id="filterDifficulty"><option value="">全難易度</option></select>
      </div>
      <div class="control">
        <label>分野</label>
        <select id="filterCategory"><option value="">全分野</option></select>
      </div>
      <div class="control">
        <label>章・項目</label>
        <select id="filterChapter"><option value="">全章</option></select>
      </div>
      <div class="control">
        <label>理解度</label>
        <select id="filterMark">
          <option value="">全理解度</option>
          <option value="○">○</option>
          <option value="△">△</option>
          <option value="×">×</option>
          <option value="blank">未マーク</option>
        </select>
      </div>
      <div class="control">
        <label>番号開始</label>
        <input id="rangeStart" type="number" min="1" max="1700" placeholder="例 501">
      </div>
      <div class="control">
        <label>番号終了</label>
        <input id="rangeEnd" type="number" min="1" max="1700" placeholder="例 700">
      </div>
      <div class="control">
        <label>テスト時間</label>
        <select id="testMinutes">
          <option value="180">180分</option>
          <option value="120">120分</option>
          <option value="60">60分</option>
          <option value="0">制限なし</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button id="startBtn" class="primary">開始</button>
      <button id="shuffleBtn">ランダム開始</button>
      <button id="resumeBtn" class="blue">前回の続き</button>
      <button id="manualBtn">手動JSON読込</button>
      <input type="file" id="fileInput" accept=".json,application/json" class="hidden">
    </div>

    <div id="questionArea" style="margin-top:14px;">
      <div class="small">開始ボタンを押してください。JSONは1700問を内蔵しています。別JSONを使う場合は「手動JSON読込」から選択してください。</div>
    </div>

    <div class="stats" id="statsArea"></div>
  </div>

  <div class="card" id="analysisCard">
    <div class="actions" style="margin-top:0;">
      <button id="analysisBtn" class="blue">成績分析を更新</button>
      <button id="exportBtn">学習記録を書き出し</button>
      <button id="importBtn">学習記録を読み込み</button>
      <input type="file" id="importInput" accept=".json,application/json" class="hidden">
      <button id="clearLearningBtn" class="danger">学習記録削除</button>
    </div>
    <div id="analysisArea" class="small" style="margin-top:10px;">成績分析を更新すると、分野別の正答率が表示されます。</div>
  </div>
</main>

<div class="footer-controls">
  <div class="footer-inner">
    <button id="prevBtn">前へ</button>
    <button id="answerBtn" class="primary">回答する</button>
    <button id="unknownBtn" class="warn">分からない</button>
    <button id="nextBtn">次へ</button>
    <button id="resetSessionBtn">今回リセット</button>
  </div>
</div>
