<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>救命士国家試験 学習ツール</title>
  <style>
    :root{
      --bg:#f5f7f8; --card:#ffffff; --text:#172026; --muted:#667085;
      --main:#0f766e; --main2:#0d9488; --border:#d8dee4;
      --danger:#dc2626; --dangerBg:#fee2e2; --ok:#16a34a; --okBg:#dcfce7;
      --warn:#d97706; --warnBg:#fff7ed;
      --shadow:0 10px 28px rgba(16,24,40,.10); --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg); color:var(--text); line-height:1.65;
      -webkit-tap-highlight-color: transparent;
    }
    header{
      background:linear-gradient(135deg,var(--main),var(--main2));
      color:white; padding:22px 16px 18px; position:sticky; top:0; z-index:10;
      box-shadow:0 4px 16px rgba(0,0,0,.12);
    }
    header h1{font-size:22px;margin:0 0 4px;font-weight:900;letter-spacing:.02em}
    header p{margin:0;font-size:13px;opacity:.95;font-weight:700}
    main{max-width:760px;margin:0 auto;padding:14px 14px 36px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin:12px 0}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button,select{font:inherit}
    button{border:0;border-radius:14px;padding:13px 14px;font-weight:800;cursor:pointer;background:#e6f4f1;color:var(--main);transition:.12s transform,.12s opacity}
    button:active{transform:scale(.98)}
    button.primary{background:var(--main);color:white;width:100%}
    button.secondary{background:#eef2f6;color:#344054}
    button.danger{background:#fee2e2;color:#991b1b}
    button.small{padding:8px 10px;border-radius:10px;font-size:13px}
    .modeBtn{flex:1 1 210px;min-height:78px;text-align:left;background:white;border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .modeBtn b{display:block;font-size:18px;color:var(--main)}
    .modeBtn .arrow{font-size:26px;color:#111827;font-weight:900}
    .muted{color:var(--muted);font-size:13px}
    .pill{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:999px;padding:4px 9px;font-size:12px;background:#fafafa;color:#475467;margin:2px;font-weight:700}
    .qNo{font-weight:900;color:var(--main);font-size:14px;margin-bottom:6px}
    .question{font-size:20px;font-weight:900;line-height:1.55;margin:8px 0 14px;white-space:pre-wrap}
    .choice{display:flex;gap:10px;align-items:center;padding:13px;border:1px solid var(--border);border-radius:14px;background:#fff;margin:9px 0;cursor:pointer;font-weight:750;min-height:64px}
    .choiceMark{
      width:38px;height:38px;border:2px solid #cbd5e1;border-radius:11px;display:flex;align-items:center;justify-content:center;
      font-size:22px;font-weight:900;flex:0 0 auto;background:#fff;color:#475467;
    }
    .choiceText{flex:1}
    .choice.triangle{border-color:#f59e0b;background:var(--warnBg)}
    .choice.triangle .choiceMark{border-color:#f59e0b;color:var(--warn)}
    .choice.circle{border-color:var(--ok);background:#f0fdf4}
    .choice.circle .choiceMark{border-color:var(--ok);color:var(--ok)}
    .choice.correct{border-color:var(--ok)!important;background:var(--okBg)!important}
    .choice.wrong{border-color:var(--danger)!important;background:var(--dangerBg)!important}
    .result{padding:14px;border-radius:14px;margin-top:12px;font-weight:900;display:none}
    .result.ok{display:block;background:var(--okBg);color:#166534}
    .result.ng{display:block;background:var(--dangerBg);color:#991b1b}
    .source{margin-top:10px;padding:12px;border-radius:12px;background:#f8fafc;border:1px dashed #cbd5e1;color:#334155;font-size:14px;display:none;font-weight:700}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .stat{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
    .stat b{display:block;font-size:20px;color:var(--main)}
    select{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:white;color:var(--text)}
    .hidden{display:none!important}
    .progressbar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:8px 0 4px}
    .progressbar span{display:block;height:100%;background:var(--main);width:0%}
    footer{font-size:12px;color:var(--muted);text-align:center;padding:20px 0}
    .unknown{
      display:flex;align-items:center;gap:10px;margin:12px 0;padding:12px;border:1px solid #fecaca;background:#fff7f7;border-radius:14px;
      color:#991b1b;font-weight:900;
    }
    .unknown input{width:22px;height:22px}
    .howto{
      margin-top:10px;padding:11px 12px;border-radius:12px;background:#fffbeb;border:1px solid #fde68a;color:#78350f;font-size:13px;font-weight:750;
    }
    .bookmarkActive{background:#fef3c7!important;color:#92400e!important}
    @media (max-width:520px){
      header h1{font-size:20px}.question{font-size:18px}.stats{grid-template-columns:1fr 1fr 1fr}.card{padding:14px}
      .choice{min-height:62px}.choiceText{font-size:16px}
    }
  </style>
</head>
<body>
<header>
  <h1>救命士国家試験 学習ツール</h1>
  <p>練習・50問実力確認・間違い復習</p>
</header>
<main>
  <section id="home" class="card">
    <div class="row">
      <button class="modeBtn" onclick="startPractice()"><span><b>練習モード</b><span class="muted">ランダムに何問でもループ</span></span><span class="arrow">›</span></button>
      <button class="modeBtn" onclick="startExam()"><span><b>50問モード</b><span class="muted">実力確認用。50問で終了</span></span><span class="arrow">›</span></button>
      <button class="modeBtn" onclick="startMistakes()"><span><b>間違い復習</b><span class="muted">過去に間違えた問題から出題</span></span><span class="arrow">›</span></button>
      <button class="modeBtn" onclick="startBookmarks()"><span><b>ブックマーク復習</b><span class="muted">⭐ 後で復習に登録した問題</span></span><span class="arrow">›</span></button>
    </div>
    <div style="height:10px"></div>
    <label class="muted">分野フィルター</label>
    <select id="categorySelect" onchange="renderHomeStats()"><option value="all">全分野</option></select>
    <div class="stats" style="margin-top:12px">
      <div class="stat"><span class="muted">総問題</span><b id="totalCount">0</b></div>
      <div class="stat"><span class="muted">正解</span><b id="correctCount">0</b></div>
      <div class="stat"><span class="muted">間違い</span><b id="wrongCount">0</b></div>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="secondary small" onclick="resetToday()">履歴リセット</button>
      <button class="secondary small" onclick="location.reload()">再読込</button>
    </div>
  </section>

  <section id="quiz" class="card hidden">
    <div class="row" style="justify-content:space-between">
      <div class="qNo" id="qMeta"></div>
      <button class="secondary small" onclick="goHome()">終了</button>
    </div>
    <div class="progressbar"><span id="progress"></span></div>
    <div class="muted" id="modeInfo"></div>
    <div id="badges" style="margin-top:8px"></div>
    <div class="question" id="questionText"></div>

    <label class="unknown">
      <input type="checkbox" id="unknownCheck" onchange="toggleUnknown()">
      <span>全くわからない（×）</span>
    </label>

    <form id="choicesBox"></form>
    <button id="answerBtn" class="primary" onclick="checkAnswer()">回答する</button>

    <div class="howto" id="howto">
      1回タップ＝△（あやしい）／ 2回タップ＝○（正解と思う）／ 全くわからない場合は上の×にチェック
    </div>

    <div id="resultBox" class="result"></div>
    <div id="sourceBox" class="source"></div>
    <div class="row" style="margin-top:12px">
      <button id="nextBtn" class="primary hidden" onclick="nextQuestion()">次の問題</button>
      <button id="bookmarkBtn" class="secondary hidden" onclick="toggleBookmark()">⭐ 後で復習</button>
    </div>
  </section>

  <section id="summary" class="card hidden">
    <h2 style="margin-top:0">50問モード結果</h2>
    <div class="stats">
      <div class="stat"><span class="muted">出題数</span><b id="sumTotal">50</b></div>
      <div class="stat"><span class="muted">正解</span><b id="sumCorrect">0</b></div>
      <div class="stat"><span class="muted">正答率</span><b id="sumRate">0%</b></div>
    </div>
    <button class="primary" style="margin-top:14px" onclick="goHome()">ホームへ戻る</button>
  </section>
  <footer>問題データ：questions.json / ブラウザ内に履歴保存</footer>
</main>
<script>
let QUESTIONS=[];
let mode='practice';
let queue=[];
let current=null;
let displayedAnswer=[];
let displayedChoices=[];
let lastQuestionId=null;
let answered=false;
let examCorrect=0;
let examTotal=0;
let examIndex=0;
const LS_KEY='emt_exam_learning_v3';

function defaultState(){return {correct:{},wrong:{},bookmarks:{},history:{}}}
function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem(LS_KEY))||defaultState();
    return {...defaultState(),...s};
  }catch(e){return defaultState()}
}
function saveState(s){localStorage.setItem(LS_KEY,JSON.stringify(s))}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function normAnswer(arr){return [...arr].map(Number).sort((a,b)=>a-b).join(',')}
function getCategory(q){return q.category || q.chapter || '未分類'}
function getLevel(q){return q.level || q.difficulty || '未分類'}
function getQuestionType(q){return q.type || q.format || ''}
function getQuestionId(q){return Number(q.number || q.id)}
function getAnswerArray(q){return (q.answer||[]).map(Number)}
function getChoices(q){
  return (q.choices||[]).map((c,idx)=>{
    if(typeof c==='string') return {text:c,originalNo:idx+1};
    return {text:c.text||String(c),originalNo:Number(c.id||idx+1)};
  });
}
function getSourceText(q){
  if(q.reference && typeof q.reference==='object'){
    const raw=q.reference.raw || '';
    const page=q.reference.page ? `p.${q.reference.page}` : '';
    return (raw || page || '未設定').trim();
  }
  if(q.source && typeof q.source==='string') return `${q.source} ${q.source_page||q.page||''}`.trim();
  return q.reference || q.source || '未設定';
}
function filterQuestions(){
  const cat=document.getElementById('categorySelect').value;
  return QUESTIONS.filter(q=>cat==='all'||getCategory(q)===cat);
}
async function init(){
  try{
    const res=await fetch('questions.json',{cache:'no-store'});
    QUESTIONS=await res.json();
  }catch(e){
    alert('questions.jsonを読み込めませんでした。index.htmlとquestions.jsonを同じ場所にアップロードしてください。');
    return;
  }
  const cats=[...new Set(QUESTIONS.map(q=>getCategory(q)).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja'));
  const sel=document.getElementById('categorySelect');
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
  renderHomeStats();
}
function renderHomeStats(){
  const s=loadState();
  const list=filterQuestions();
  const ids=new Set(list.map(q=>String(getQuestionId(q))));
  document.getElementById('totalCount').textContent=list.length;
  document.getElementById('correctCount').textContent=Object.keys(s.correct||{}).filter(id=>ids.has(id)).length;
  document.getElementById('wrongCount').textContent=Object.keys(s.wrong||{}).filter(id=>ids.has(id)).length;
}
function goHome(){
  document.getElementById('home').classList.remove('hidden');
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('summary').classList.add('hidden');
  renderHomeStats();
}
function startPractice(){
  mode='practice'; examCorrect=0; examTotal=0; examIndex=0;
  queue=shuffle([...filterQuestions()]);
  if(!queue.length)return alert('この分野の問題がありません。');
  showQuiz(); nextQuestion();
}
function startExam(){
  mode='exam'; examCorrect=0; examTotal=50; examIndex=0;
  const list=shuffle([...filterQuestions()]);
  if(list.length<50 && !confirm('この分野は50問未満です。ある分だけ出題します。'))return;
  queue=list.slice(0,50);
  examTotal=queue.length;
  showQuiz(); nextQuestion();
}
function startMistakes(){
  mode='mistakes'; examCorrect=0; examTotal=0; examIndex=0;
  const s=loadState();
  const ids=new Set(Object.keys(s.wrong||{}).map(Number));
  queue=shuffle(filterQuestions().filter(q=>ids.has(getQuestionId(q))));
  if(!queue.length)return alert('間違えた問題がまだありません。');
  showQuiz(); nextQuestion();
}
function startBookmarks(){
  mode='bookmarks'; examCorrect=0; examTotal=0; examIndex=0;
  const s=loadState();
  const ids=new Set(Object.keys(s.bookmarks||{}).map(Number));
  queue=shuffle(filterQuestions().filter(q=>ids.has(getQuestionId(q))));
  if(!queue.length)return alert('ブックマークした問題がまだありません。');
  showQuiz(); nextQuestion();
}
function showQuiz(){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('summary').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
}
function nextQuestion(){
  if(mode==='exam' && examIndex>=examTotal){return showSummary()}
  if(queue.length===0){queue=shuffle([...filterQuestions()]); if(!queue.length)return goHome();}
  current=queue.shift();
  if(queue.length>0 && getQuestionId(current)===lastQuestionId){queue.push(current); current=queue.shift();}
  lastQuestionId=getQuestionId(current);
  answered=false;
  if(mode==='exam')examIndex++;
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderQuestion(){
  document.getElementById('resultBox').className='result';
  document.getElementById('resultBox').textContent='';
  document.getElementById('sourceBox').style.display='none';
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('bookmarkBtn').classList.add('hidden');
  document.getElementById('answerBtn').classList.remove('hidden');
  document.getElementById('howto').classList.remove('hidden');
  document.getElementById('unknownCheck').checked=false;
  const modeName=mode==='practice'?'練習モード':mode==='exam'?'50問モード':mode==='mistakes'?'間違い復習モード':'ブックマーク復習モード';
  document.getElementById('modeInfo').textContent=mode==='exam'?`${modeName}：${examIndex}/${examTotal}`:modeName;
  document.getElementById('progress').style.width=mode==='exam'?`${(examIndex/examTotal)*100}%`:'0%';
  document.getElementById('qMeta').textContent=`問題 ${getQuestionId(current)}`;
  const s=loadState();
  const hist=s.history?.[getQuestionId(current)]||{try:0,ok:0};
  const rate=hist.try?` / 過去${hist.try}回中${hist.ok}回正解`:' / 初回';
  const correctCount=getAnswerArray(current).length;
  document.getElementById('badges').innerHTML=`<span class="pill">${getLevel(current)}</span><span class="pill">${getCategory(current)}</span><span class="pill">${correctCount}個選択</span><span class="pill">${getQuestionType(current)||'形式未設定'}${rate}</span>`;
  document.getElementById('questionText').textContent=current.question;
  const originalAnswer=getAnswerArray(current);
  displayedChoices=shuffle(getChoices(current)).map((item,idx)=>({...item,displayNo:idx+1,mark:''}));
  displayedAnswer=displayedChoices.map((item)=>originalAnswer.includes(item.originalNo)?item.displayNo:null).filter(v=>v!==null);
  renderChoices();
}
function renderChoices(){
  const box=document.getElementById('choicesBox'); box.innerHTML='';
  displayedChoices.forEach((item,i)=>{
    const n=i+1;
    const label=document.createElement('div');
    label.className='choice';
    if(item.mark==='△') label.classList.add('triangle');
    if(item.mark==='○') label.classList.add('circle');
    label.dataset.no=n;
    label.innerHTML=`<span class="choiceMark">${item.mark||''}</span><span class="choiceText">${['①','②','③','④','⑤'][i]} ${item.text}</span>`;
    label.onclick=()=>cycleChoice(n);
    box.appendChild(label);
  });
}
function cycleChoice(displayNo){
  if(answered)return;
  document.getElementById('unknownCheck').checked=false;
  const item=displayedChoices.find(x=>x.displayNo===displayNo);
  if(!item)return;
  if(item.mark==='') item.mark='△';
  else if(item.mark==='△') item.mark='○';
  else if(item.mark==='○') item.mark='';
  renderChoices();
}
function toggleUnknown(){
  if(answered)return;
  if(document.getElementById('unknownCheck').checked){
    displayedChoices.forEach(x=>x.mark='');
    renderChoices();
  }
}
function checkAnswer(){
  if(answered)return;
  const unknown=document.getElementById('unknownCheck').checked;
  const selected=unknown?[]:displayedChoices.filter(x=>x.mark==='○').map(x=>x.displayNo);
  if(!unknown && selected.length===0)return alert('選択肢をタップしてください。1回タップで△、2回タップで○です。');
  const ok=!unknown && normAnswer(selected)===normAnswer(displayedAnswer);
  answered=true;
  const qid=getQuestionId(current);
  const s=loadState();
  if(!s.history[qid])s.history[qid]={try:0,ok:0};
  s.history[qid].try++;
  if(ok)s.history[qid].ok++;
  if(ok){s.correct[qid]=Date.now(); delete s.wrong[qid]; if(mode==='exam')examCorrect++;}
  else{s.wrong[qid]=Date.now();}
  saveState(s);

  document.querySelectorAll('.choice').forEach((el,idx)=>{
    const n=idx+1;
    const mark=el.querySelector('.choiceMark');
    if(unknown && !displayedAnswer.includes(n)) mark.textContent='×';
    if(displayedAnswer.includes(n)){
      el.classList.add('correct');
      if(!mark.textContent) mark.textContent='○';
    }else if(selected.includes(n) || unknown){
      el.classList.add('wrong');
      if(!mark.textContent) mark.textContent=unknown?'×':'○';
    }
  });

  const rb=document.getElementById('resultBox');
  rb.className='result '+(ok?'ok':'ng');
  rb.textContent=ok?'正解！':'不正解';
  const ans=displayedAnswer.map(n=>['①','②','③','④','⑤'][n-1]).join('・');
  const sb=document.getElementById('sourceBox');
  sb.innerHTML=`<b>正答：</b>${ans}<br><b>出典：</b>${getSourceText(current)}`;
  sb.style.display='block';
  document.getElementById('answerBtn').classList.add('hidden');
  document.getElementById('howto').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('bookmarkBtn').classList.remove('hidden');
  const bs=loadState();
  document.getElementById('bookmarkBtn').classList.toggle('bookmarkActive',!!bs.bookmarks[qid]);
  document.getElementById('bookmarkBtn').textContent=bs.bookmarks[qid]?'⭐ ブックマーク解除':'⭐ 後で復習';
  renderHomeStats();
}
function toggleBookmark(){
  const qid=getQuestionId(current);
  const s=loadState();
  if(s.bookmarks[qid]){delete s.bookmarks[qid]; alert('ブックマークを解除しました');}
  else{s.bookmarks[qid]=Date.now(); alert('ブックマークしました');}
  saveState(s);
  document.getElementById('bookmarkBtn').classList.toggle('bookmarkActive',!!s.bookmarks[qid]);
  document.getElementById('bookmarkBtn').textContent=s.bookmarks[qid]?'⭐ ブックマーク解除':'⭐ 後で復習';
}
function showSummary(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('summary').classList.remove('hidden');
  document.getElementById('sumTotal').textContent=examTotal;
  document.getElementById('sumCorrect').textContent=examCorrect;
  document.getElementById('sumRate').textContent=examTotal?Math.round((examCorrect/examTotal)*100)+'%':'0%';
}
function resetToday(){
  if(confirm('正解・間違い・ブックマーク・正答率履歴をすべて削除しますか？')){
    localStorage.removeItem(LS_KEY);
    renderHomeStats();
  }
}
init();
</script>
</body>
</html>
