c":"接遇・コミュニケーション","reference_accuracy":"chapter_range"},{"id":761,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者に対して共感的な態度を示す目的として最も適切なのはどれか。1つ選べ。","choices":["傷病者との信頼関係を築き、不安の軽減につなげるため。","活動時間を延長するため。","医療者の権威を示すため。","処置内容を説明しなくて済むようにするため。","家族との会話を避けるため。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・信頼関係","reference_accuracy":"chapter_range"},{"id":762,"level":"一般","category":"救急救命士の活動と接遇","question":"傷病者や家族への説明を行う際に適切なのはどれか。2つ選べ。","choices":["相手の理解度を確認しながら説明する。","落ち着いた口調で説明する。","専門用語だけで説明する。","相手の質問には答えない。","一方的に話し続ける。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"説明・コミュニケーション","reference_accuracy":"chapter_range"},{"id":763,"level":"難問","category":"症例問題・救急救命士の活動と接遇","question":"搬送先医療機関へ到着後、家族から搬送中の処置内容について質問を受けた。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["分かりやすい言葉で実施した処置を説明し、不明な点には誠実に対応する。","「忙しいので説明できません」と断る。","専門用語だけで説明する。","家族には一切説明しない。","説明は医師だけが行うものなので対応しない。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"家族対応・説明","reference_accuracy":"chapter_range"},{"id":764,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が現場活動中に礼節を保つことの意義として最も適切なのはどれか。1つ選べ。","choices":["傷病者や家族との信頼関係の構築につながる。","現場活動時間を必ず短縮できる。","医療事故を完全に防止できる。","搬送先を自由に決定できる。","説明を省略できる。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・礼節","reference_accuracy":"chapter_range"},{"id":765,"level":"難問","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者・家族との良好な関係を築くために重要なのはどれか。2つ選べ。","choices":["傾聴を心掛ける。","相手の立場を理解しようと努める。","一方的に指示だけを行う。","医療者の都合を優先する。","必要な説明を省略する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・コミュニケーション","reference_accuracy":"chapter_range"},{"id":766,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者へ接する際、第一印象を良好にするために最も適切なのはどれか。1つ選べ。","choices":["清潔感のある身だしなみと礼儀正しい態度で接する。","無言で処置を開始する。","傷病者の話を聞かず活動する。","不機嫌な表情で対応する。","家族との会話を避ける。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・第一印象","reference_accuracy":"chapter_range"},{"id":767,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士の接遇として適切なのはどれか。2つ選べ。","choices":["傷病者のプライバシーに配慮する。","丁寧な言葉遣いを心掛ける。","相手を威圧する態度で接する。","必要な説明を省略する。","傷病者の訴えを無視する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・患者対応","reference_accuracy":"chapter_range"},{"id":768,"level":"難問","category":"症例問題・救急救命士の活動と接遇","question":"認知症が疑われる高齢傷病者が、救急隊の説明を十分に理解できない様子であった。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["ゆっくり分かりやすい言葉で繰り返し説明し、必要に応じて家族の協力も得る。","理解できないため説明は中止する。","家族だけに説明し、本人には全く説明しない。","大声で同じ説明を繰り返す。","搬送を中止する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"高齢者対応・コミュニケーション","reference_accuracy":"chapter_range"},{"id":769,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者の話を傾聴する目的として最も適切なのはどれか。1つ選べ。","choices":["傷病者の訴えや不安を正確に把握するため。","活動時間を長くするため。","処置を遅らせるため。","家族との会話を減らすため。","傷病者へ質問しないため。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"傾聴・コミュニケーション","reference_accuracy":"chapter_range"},{"id":770,"level":"難問","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者・家族から信頼を得るために重要なのはどれか。2つ選べ。","choices":["誠実な態度で対応する。","分かりやすい説明を心掛ける。","自分の都合を優先して活動する。","相手の話を途中で遮る。","必要な説明を省略する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"信頼関係・接遇","reference_accuracy":"chapter_range"},{"id":771,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者へ処置内容を説明する際の目的として最も適切なのはどれか。1つ選べ。","choices":["傷病者の理解と安心感を得るため。","処置時間を延長するため。","医療者の知識を示すため。","苦情を完全になくすため。","家族との会話を避けるため。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"説明・コミュニケーション","reference_accuracy":"chapter_range"},{"id":772,"level":"一般","category":"救急救命士の活動と接遇","question":"傷病者や家族への接遇として適切なのはどれか。2つ選べ。","choices":["相手の立場を理解しようと努める。","丁寧で分かりやすい言葉遣いを心掛ける。","相手の話を途中で遮る。","不安な様子を無視して活動する。","自分の都合を優先して対応する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・コミュニケーション","reference_accuracy":"chapter_range"},{"id":773,"level":"難問","category":"症例問題・救急救命士の活動と接遇","question":"傷病者が強い疼痛を訴え、「このまま死んでしまうのではないか」と不安を口にしている。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["落ち着いた態度で声を掛け、現在の状況や今後の対応を分かりやすく説明する。","「大丈夫だから黙っていてください」とだけ伝える。","不安を無視して処置のみを優先する。","家族だけに説明し、本人には何も伝えない。","不安を訴えるたびに注意する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"傷病者対応・説明","reference_accuracy":"chapter_range"},{"id":774,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者へ説明した後に行う対応として最も適切なのはどれか。1つ選べ。","choices":["内容を理解できたか確認する。","説明後は会話を終了する。","理解できたかは確認しない。","家族だけに確認する。","専門用語で再度説明する。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"説明・コミュニケーション","reference_accuracy":"chapter_range"},{"id":775,"level":"難問","category":"救急救命士の活動と接遇","question":"救急救命士に求められる接遇・コミュニケーションとして適切なのはどれか。2つ選べ。","choices":["傷病者の尊厳を尊重する。","傷病者・家族の不安に配慮する。","医療者の都合だけを優先する。","必要な説明を省略する。","相手の話を聞かずに活動する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇の基本・コミュニケーション","reference_accuracy":"chapter_range"},{"id":776,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者に声を掛ける際の対応として最も適切なのはどれか。1つ選べ。","choices":["穏やかな口調で、傷病者の状態に配慮して話しかける。","大声で一方的に指示する。","傷病者の反応を確認せず話し続ける。","専門用語だけで説明する。","不安を訴えても対応しない。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・声かけ","reference_accuracy":"chapter_range"},{"id":777,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者へ説明する際に適切なのはどれか。2つ選べ。","choices":["処置の目的を分かりやすく伝える。","傷病者の理解を確認する。","説明を省略して処置を進める。","相手の質問を避ける。","家族だけに説明すれば十分である。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P48～49","reference_topic":"説明・理解確認","reference_accuracy":"chapter_range"},{"id":778,"level":"難問","category":"症例問題・救急救命士の活動と接遇","question":"救急現場で、傷病者が羞恥心から症状を詳しく話すことをためらっていた。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["プライバシーに配慮し、安心して話せる環境を整える。","周囲に聞こえるよう大きな声で質問する。","話したくないなら聴取を中止する。","家族の前でのみ詳しく質問する。","傷病者の羞恥心は考慮しない。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","pa 明より処置を優先し、説明は不要である。","家族だけに説明すればよい。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"説明・コミュニケーション","reference_accuracy":"chapter_range"},{"id":797,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が良好な接遇を実践するために重要なのはどれか。2つ選べ。","choices":["清潔感のある身だしなみを保つ。","礼節ある態度で対応する。","相手を威圧するような態度をとる。","傷病者の話を遮って処置を進める。","自分の感情を優先して対応する。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"身だしなみ・接遇","reference_accuracy":"chapter_range"},{"id":798,"level":"難問","category":"症例問題・救急救命士の活動と接遇","question":"救急隊が現場へ到着すると、傷病者は強い不安から救急隊員の質問に十分答えられなかった。救急救命士として最も適切な対応はどれか。1つ選べ。","choices":["落ち着いた口調で安心感を与えながら、必要な情報を順序立てて聴取する。","情報が得られないため聴取を中止する。","大声で繰り返し質問する。","傷病者を叱責して回答を促す。","家族だけから情報を得て本人には話しかけない。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"コミュニケーション・傾聴","reference_accuracy":"chapter_range"},{"id":799,"level":"一般","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者の話を傾聴することによって期待される効果として最も適切なのはどれか。1つ選べ。","choices":["傷病者との信頼関係を築き、必要な情報を正確に把握できる。","現場活動時間を必ず短縮できる。","医療事故を防止できる。","必ず救命率が向上する。","説明を行う必要がなくなる。"],"answer":[1],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"傾聴・信頼関係","reference_accuracy":"chapter_range"},{"id":800,"level":"難問","category":"救急救命士の活動と接遇","question":"救急救命士が傷病者・家族へ接する際に重要な対応として適切なのはどれか。2つ選べ。","choices":["相手の不安や心情に配慮する。","必要な情報を分かりやすく説明する。","傷病者の社会的立場によって対応を変える。","忙しいことを理由に説明を省略する。","相手の質問には応じない。"],"answer":[1,2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P47～49","reference_topic":"接遇・コミュニケーション","reference_accuracy":"chapter_range"},{"id":801,"level":"一般","category":"疾患の原因","question":"疾患の発生に不可欠な病因を何というか。1つ選べ。","choices":["誘因","主因","素因","外因","環境要因"],"answer":[2],"source":"救急隊員標準テキスト（改訂第5版）","page":"P155","reference_topic":"疾患の原因・主因と誘因","reference_accuracy":"chapter_range"},{"id":802,"level":"一般","category":"病因","question":"病因を「内因」に分類するものはどれか。2つ選べ。","choices":["遺伝性疾患","外傷","染色体異常","熱傷","化学物質による中毒"],"answer":[1,3],"source":"救急隊員標準テキスト（改訂第5版）","page":"P155","reference_ ","category":"第Ⅲ編 第6章 外傷救急医学（高リスク受傷機転）","difficulty":"一般","format":"","question":"高リスク受傷機転に該当するものはどれか。2つ選べ。","choices":[{"id":1,"text":"同乗者が死亡した交通事故"},{"id":2,"text":"6m以上（または3階以上）からの墜落"},{"id":3,"text":"軽微な擦過傷のみの転倒"},{"id":4,"text":"椅子からの転落"},{"id":5,"text":"指先の切創"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.691～692（高リスク受傷機転）","source_page":"p.691～692","reference_topic":"高リスク受傷機転"},{"id":1508,"number":1508,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（受傷機転・症例）","difficulty":"国家試験レベル","format":"","question":"高速道路での交通事故で車外へ放出された傷病者である。現場で最も重要な判断はどれか。1つ選べ。","choices":[{"id":1,"text":"高エネルギー外傷として重症を疑う。"},{"id":2,"text":"外表に損傷が少なければ軽症と判断する。"},{"id":3,"text":"歩行可能なら搬送不要と判断する。"},{"id":4,"text":"年齢のみで重症度を判断する。"},{"id":5,"text":"痛みが軽ければ観察不要とする。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.691～692（高エネルギー外傷）","source_page":"p.691～692","reference_topic":"高エネルギー外傷"},{"id":1509,"number":1509,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（外傷の力学）","difficulty":"難問","format":"","question":"受傷機転から推測できる情報はどれか。2つ選べ。","choices":[{"id":1,"text":"外力の方向"},{"id":2,"text":"損傷臓器の推定"},{"id":3,"text":"血液型"},{"id":4,"text":"アレルギー歴"},{"id":5,"text":"家族歴"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.691～692（受傷機転の評価）","source_page":"p.691～692","reference_topic":"受傷機転の評価"},{"id":1510,"number":1510,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（受傷機転・現場活動）","difficulty":"難問","format":"","question":"受傷機転を評価する際の考え方として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"受傷機転と傷病者の状態に矛盾がないか確認する。"},{"id":2,"text":"高リスク受傷機転では重症損傷を常に念頭に置く。"},{"id":3,"text":"外表に損傷が少なければ重症外傷は否定できる。"},{"id":4,"text":"受傷機転は搬送先選定に影響しない。"},{"id":5,"text":"高リスク受傷機転でも詳細な観察は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.691～693（受傷機転の評価と現場活動）","source_page":"p.691～693","reference_topic":"受傷機転の評価と現場活動"},{"id":1511,"number":1511,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（鈍的外傷）","difficulty":"一般","format":"","question":"鈍的外傷の特徴として最も適切なのはどれか。1つ選べ。","choices":[{"id":1,"text":"外力が広い範囲に加わり、内部臓器を損傷することがある。"},{"id":2,"text":"必ず開放創を伴う。"},{"id":3,"text":"損傷は皮膚だけに限られる。"},{"id":4,"text":"鋭利な刃物によってのみ生じる。"},{"id":5,"text":"必ず骨折を伴う。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.693～694（鈍的外傷）","source_page":"p.693～694","reference_topic":"鈍的外傷"},{"id":1512,"number":1512,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（鋭的外傷）","difficulty":"一般","format":"","question":"鋭的外傷の特徴として正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"刃物など鋭利な物体で受傷する。"},{"id":2,"text":"深部臓器損傷を伴うことがある。"},{"id":3,"text":"必ず広範囲の皮膚損傷となる。"},{"id":4,"text":"必ず鈍的外傷を合併する。"},{"id":5,"text":"必ず意識障害を伴う。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.694～696（鋭的外傷）","source_page":"p.694～696","reference_topic":"鋭的外傷"},{"id":1513,"number":1513,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（受傷機転・症例）","difficulty":"国家試験レベル","format":"","question":"胸部を刃物で刺された傷病者で、外表の創は小さいがショックを認める。最も考えるべきことはどれか。1つ選べ。","choices":[{"id":1,"text":"深部臓器や大血管損傷の可能性"},{"id":2,"text":"外傷は軽症である。"},{"id":3,"text":"出血はほとんどない。"},{"id":4,"text":"搬送の必要はない。"},{"id":5,"text":"皮膚損傷のみである。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.694～696（刺創）","source_page":"p.694～696","reference_topic":"刺創"},{"id":1514,"number":1514,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（エネルギー伝達）","difficulty":"難問","format":"","question":"外傷におけるエネルギー伝達について正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"運動エネルギーが人体へ伝達されて損傷が生じる。"},{"id":2,"text":"エネルギーが大きいほど重症化しやすい。"},{"id":3,"text":"外表に創がなければエネルギーは伝達されない。"},{"id":4,"text":"エネルギー伝達は損傷の推定に不要である。"},{"id":5,"text":"エネルギー量は受傷機転と無関係である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.692～696（外傷の力学）","source_page":"p.692～696","reference_topic":"外傷の力学"},{"id":1515,"number":1515,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（受傷機転・現場活動）","difficulty":"難問","format":"","question":"受傷機転を踏まえた現場活動として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"外表所見だけでなく受傷機転から内因性損傷も推定する。"},{"id":2,"text":"高エネルギー外傷では潜在的重症損傷を考慮して活動する。"},{"id":3,"text":"外表損傷が軽ければ重症外傷を xt":"必ず表皮のみの損傷である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「外傷の病態生理」p.695～696（裂創・挫創）","source_page":"p.695～696","reference_topic":"裂創・挫創"},{"id":1573,"number":1573,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（症例）","difficulty":"国家試験レベル","format":"","question":"重量物が下腿に落下し、創部は不整で周囲組織の挫滅を認める。最も考えられる創傷はどれか。1つ選べ。","choices":[{"id":1,"text":"挫創"},{"id":2,"text":"切創"},{"id":3,"text":"刺創"},{"id":4,"text":"擦過傷"},{"id":5,"text":"咬創"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「外傷の病態生理」p.695～696（挫創）","source_page":"p.695～696","reference_topic":"挫創"},{"id":1574,"number":1574,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（擦過傷）","difficulty":"難問","format":"","question":"擦過傷への対応として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"創面を十分に洗浄する。"},{"id":2,"text":"創部を保護して感染予防を図る。"},{"id":3,"text":"汚染があっても洗浄は不要である。"},{"id":4,"text":"創部は乾燥させるだけでよい。"},{"id":5,"text":"異物の確認は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「外傷の病態生理」p.695～696（擦過傷）","source_page":"p.695～696","reference_topic":"擦過傷"},{"id":1575,"number":1575,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（創傷管理）","difficulty":"難問","format":"","question":"創傷管理における初期評価として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"創の深さや汚染の程度を確認する。"},{"id":2,"text":"神経・血管・腱損傷の有無を評価する。"},{"id":3,"text":"外表創のみで重症度を判断する。"},{"id":4,"text":"創部以外の観察は不要である。"},{"id":5,"text":"出血量の評価は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「外傷の病態生理」p.695～696（創傷管理）","source_page":"p.695～696","reference_topic":"創傷管理"},{"id":1576,"number":1576,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（創傷管理）","difficulty":"一般","format":"","question":"創傷を評価する際、最も優先して確認すべきものはどれか。1つ選べ。","choices":[{"id":1,"text":"出血の有無と程度"},{"id":2,"text":"靴のサイズ"},{"id":3,"text":"利き手のみ"},{"id":4,"text":"職業"},{"id":5,"text":"髪型"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「外傷の病態生理」p.695～697（創傷管理）","source_page":"p.695～697","reference_topic":"創傷管理"},{"id":1577,"number":1577,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（刺創）","difficulty":"一般","format":"","question":"刺創で注意すべき点はどれか。2つ選べ。","choices":[{"id":1,"text":"創口が小さくても深部損傷を疑う。"},{"id":2,"text":"重要臓器や血管損傷の可能性を考える。"},{"id":3,"text":"創口が小さければ軽症と判断する。"},{"id":4,"text":"バイタルサインは評価しなくてよい。"},{"id":5,"text":"搬送は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「外傷の病態生理」p.696～697（刺創）","source_page":"p.696～697","reference_topic":"刺創"},{"id":1578,"number":1578,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（症例）","difficulty":"国家試験レベル","format":"","question":"腹部を刃物で刺された傷病者で、外表の創は小さいが顔面蒼白、冷汗、頻脈を認める。最も適切な判断はどれか。1つ選べ。","choices":[{"id":1,"text":"腹腔内出血や臓器損傷を疑う。"},{"id":2,"text":"創が小さいため軽症である。"},{"id":3,"text":"止血できていれば観察不要である。"},{"id":4,"text":"刺創ではショックは起こらない。"},{"id":5,"text":"搬送は不要である。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「外傷の病態生理」p.696～697（刺創）","source_page":"p.696～697","reference_topic":"刺創"},{"id":1579,"number":1579,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（杙創）","difficulty":"難問","format":"","question":"杙創の現場対応として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"刺入物を抜去せず固定する。"},{"id":2,"text":"出血や循環状態を継続して評価する。"},{"id":3,"text":"刺入物は現場で速やかに抜去する。"},{"id":4,"text":"創部のみ観察すればよい。"},{"id":5,"text":"バイタルサインの測定は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「外傷の病態生理」p.696～697（杙創）","source_page":"p.696～697","reference_topic":"杙創"},{"id":1580,"number":1580,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（咬創・感染）","difficulty":"難問","format":"","question":"咬創への対応として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"感染の危険性を考慮する。"},{"id":2,"text":"創部の洗浄・保護を考慮する。"},{"id":3,"text":"感染予防は不要である。"},{"id":4,"text":"必ず軽症として扱う。"},{"id":5,"text":"創部の観察は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「外傷の病態生理」p.696～697（咬創）","source_page":"p.696～697","reference_topic":"咬創"},{"id":1581,"number":1581,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（前面衝突）","difficulty":"一般","format":"","question":"自動車の前面衝突において、シートベルトとエアバッグの主な役割として最も適切なのはどれか。1つ選べ。","choices":[{"id":1,"text":"搭乗者に加わる外力を軽減し、損傷を減らす。"},{"id":2,"text":"車両の速度を上げる。"},{"id":3,"text":"骨折を完全に防ぐ。"},{"id":4,"text":"必ず頸椎損傷を防ぐ。"},{"id":5,"text":"内臓損傷は起こらなくなる。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.696～697（前面衝突）","source_page":"p.696～697","reference_topic":"前面衝突"},{"id":1582,"number":1582,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（ダッシュボード外傷）","difficulty":"一般","format":"","question":"ダッシュボード外傷で認められる損傷として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"股関節後方脱臼"},{"id":2,"text":"膝窩動静脈損傷"},{"id":3,"text":"肺気腫"},{"id":4,"text":"急性虫垂炎"},{"id":5,"text":"糖尿病"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.696～697（ダッシュボード外傷）","source_page":"p.696～697","reference_topic":"ダッシュボード外傷"},{"id":1583,"number":1583,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（側面衝突）","difficulty":"国家試験レベル","format":"","question":"側面衝突事故後、左側胸部を強打した傷病者である。側面衝突で特に起こりやすい損傷として最も適切なのはどれか。1つ選べ。","choices":[{"id":1,"text":"肋骨骨折"},{"id":2,"text":"アキレス腱断裂"},{"id":3,"text":"尺骨神経麻痺のみ"},{"id":4,"text":"虫垂炎"},{"id":5,"text":"気胸は起こらない。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.697（側面衝突）","source_page":"p.697","reference_topic":"側面衝突"},{"id":1584,"number":1584,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（後面衝突）","difficulty":"難問","format":"","question":"後面衝突（追突事故）で起こりやすい損傷として正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"外傷性頸椎症候群（むち打ち損傷）"},{"id":2,"text":"頸椎・頸髄損傷"},{"id":3,"text":"骨盤開放骨折が必発である。"},{"id":4,"text":"肝破裂が最も多い。"},{"id":5,"text":"下腿切断が特徴である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.697（後面衝突）","source_page":"p.697","reference_topic":"後面衝突"},{"id":1585,"number":1585,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（車外放出）","difficulty":"難問","format":"","question":"交通事故で乗員が車外へ放出された場合の特徴として正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"車内に留まった場合より重症となる傾向がある。"},{"id":2,"text":"二次衝撃による損傷を受ける可能性がある。"},{"id":3,"text":"頭部外傷の頻度は低下する。"},{"id":4,"text":"死亡率は低下する。"},{"id":5,"text":"車内に留まる場合より安全である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.697（車外放出）","source_page":"p.697","reference_topic":"車外放出"},{"id":1586,"number":1586,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（自動二輪車外傷）","difficulty":"一般","format":"","question":"自動二輪車事故の特徴として最も適切なのはどれか。1つ選べ。","choices":[{"id":1,"text":"シートベルトやエアバッグなどの安全装置がなく、投げ出されて二次損傷を受けやすい。"},{"id":2,"text":"車体の変形により衝撃が十分吸収される。"},{"id":3,"text":"車外放出は起こらない。"},{"id":4,"text":"頭部外傷は極めて少ない。"},{"id":5,"text":"自動車事故より軽症となることが多い。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.697～698（自動二輪車の外傷）","source_page":"p.697～698","reference_topic":"自動二輪車の外傷"},{"id":1587,"number":1587,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（自動二輪車外傷）","difficulty":"一般","format":"","question":"自動二輪車事故で特徴的な損傷として正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"燃料タンクへの衝突による会陰部・骨盤損傷"},{"id":2,"text":"ハンドルによる腹部損傷"},{"id":3,"text":"ダッシュボード外傷のみが生じる。"},{"id":4,"text":"エアバッグ損傷が主体である。"},{"id":5,"text":"シートベルト損傷が主体である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.698（自動二輪車の外傷）","source_page":"p.698","reference_topic":"自動二輪車の外傷"},{"id":1588,"number":1588,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（自転車外傷）","difficulty":"国家試験レベル","format":"","question":"自転車事故で傷病者と自転車が大きく離れた位置で発見された。この所見から最も推測されることはどれか。1つ選べ。","choices":[{"id":1,"text":"大きな外力が加わった可能性が高い。"},{"id":2,"text":"軽症である可能性が高い。"},{"id":3,"text":"内臓損傷は否定できる。"},{"id":4,"text":"頭部外傷は起こらない。"},{"id":5,"text":"頸椎損傷は考慮不要である。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.698（自転車の外傷）","source_page":"p.698","reference_topic":"自転車の外傷"},{"id":1589,"number":1589,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（歩行者外傷）","difficulty":"難問","format":"","question":"成人歩行者が自動車にはねられた際の受傷機転として正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"初回衝突では下肢や骨盤を損傷しやすい。"},{"id":2,"text":"その後、頭部・顔面がボンネットやフロントガラスへ衝突することがある。"},{"id":3,"text":"最初に頭部のみ受傷する。"},{"id":4,"text":"路面への転倒による損傷は起こらない。"},{"id":5,"text":"二次・三次損傷は存在しない。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.698～699（歩行者の外傷）","source_page":"p.698～699","reference_topic":"歩行者の外傷"},{"id":1590,"number":1590,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（歩行者外傷）","difficulty":"難問","format":"","question":"小児歩行者の交通外傷の特徴として正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"パンパーの高さに一致して頭部・顔面や胸腹部へ直達外力が加わることがある。"},{"id":2,"text":"車両の下へ巻き込まれ、轢過されることがある。"},{"id":3,"text":"成人と全く同じ受傷機転のみを示す。"},{"id":4,"text":"頭部外傷はほとんど起こらない。"},{"id":5,"text":"デコルマン損傷は生じない。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.699（歩行者の外傷）","source_page":"p.699","reference_topic":"歩行者の外傷"},{"id":1591,"number":1591,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（転落外傷）","difficulty":"一般","format":"","question":"転落外傷の重症度を評価する際に最も重要な情報はどれか。1つ選べ。","choices":[{"id":1,"text":"転落した高さや着地状況などの受傷機転"},{"id":2,"text":"傷病者の職業"},{"id":3,"text":"靴の色"},{"id":4,"text":"利き手"},{"id":5,"text":"髪型"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.699～700（転落外傷）","source_page":"p.699～700","reference_topic":"転落外傷"},{"id":1592,"number":1592,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（転落外傷）","difficulty":"一般","format":"","question":"高所転落傷病者の評価で確認すべき事項はどれか。2つ選べ。","choices":[{"id":1,"text":"転落した高さ"},{"id":2,"text":"着地部位・着地姿勢"},{"id":3,"text":"血液型のみ"},{"id":4,"text":"食事内容のみ"},{"id":5,"text":"利き足のみ"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.699～700（転落外傷）","source_page":"p.699～700","reference_topic":"転落外傷"},{"id":1593,"number":1593,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（症例）","difficulty":"国家試験レベル","format":"","question":"4階相当の高さから転落した傷病者で、外表の損傷は軽微である。最も適切な判断はどれか。1つ選べ。","choices":[{"id":1,"text":"高エネルギー外傷として潜在的な重症損傷を考慮する。"},{"id":2,"text":"外表損傷が軽いため軽症と判断する。"},{"id":3,"text":"バイタルサインの測定は不要である。"},{"id":4,"text":"頸椎損傷は否定できる。"},{"id":5,"text":"搬送は不要である。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転」p.699～700（転落外傷）","source_page":"p.699～700","reference_topic":"転落外傷"},{"id":1594,"number":1594,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（爆傷）","difficulty":"難問","format":"","question":"爆傷の一次爆傷として特徴的な損傷はどれか。2つ選べ。","choices":[{"id":1,"text":"肺損傷"},{"id":2,"text":"鼓膜損傷"},{"id":3,"text":"橈骨遠位端骨折"},{"id":4,"text":"足関節捻挫"},{"id":5,"text":"手指切創"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.700（爆傷）","source_page":"p.700","reference_topic":"爆傷"},{"id":1595,"number":1595,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（スポーツ外傷）","difficulty":"難問","format":"","question":"スポーツ外傷の初期評価として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"受傷機転を詳細に確認する。"},{"id":2,"text":"神経・血管障害の有無を評価する。"},{"id":3,"text":"外表損傷だけで重症度を判断する。"},{"id":4,"text":"バイタルサインの確認は不要である。"},{"id":5,"text":"受傷部位以外の観察は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転」p.700～701（スポーツ外傷）","source_page":"p.700～701","reference_topic":"スポーツ外傷"},{"id":1596,"number":1596,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（高エネルギー外傷）","difficulty":"一般","format":"","question":"高エネルギー外傷の評価として最も重要なものはどれか。1つ選べ。","choices":[{"id":1,"text":"外表損傷だけでなく受傷機転を含めて総合的に評価する。"},{"id":2,"text":"創傷の大きさだけで重症度を判断する。"},{"id":3,"text":"骨折がなければ重症ではない。"},{"id":4,"text":"意識清明なら重症外傷は否定できる。"},{"id":5,"text":"バイタルサインの評価は不要である。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転・外傷の病態生理」p.694～701（総論）","source_page":"p.694～701","reference_topic":"総論"},{"id":1597,"number":1597,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（外傷初期評価）","difficulty":"一般","format":"","question":"外傷傷病者の初期評価として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"受傷機転を確認する。"},{"id":2,"text":"バイタルサインを繰り返し評価する。"},{"id":3,"text":"外表損傷だけで重症度を決定する。"},{"id":4,"text":"搬送中の再評価は不要である。"},{"id":5,"text":"出血量の評価は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転・外傷の病態生理」p.694～701（初期評価）","source_page":"p.694～701","reference_topic":"初期評価"},{"id":1598,"number":1598,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（症例）","difficulty":"国家試験レベル","format":"","question":"交通事故で救出された傷病者は意識清明で外表損傷も軽微であった。しかし車両は大破している。最も適切な判断はどれか。1つ選べ。","choices":[{"id":1,"text":"高エネルギー外傷として潜在的な重症損傷を考慮する。"},{"id":2,"text":"意識清明であるため重症外傷を否定できる。"},{"id":3,"text":"外表損傷が軽いため搬送は不要である。"},{"id":4,"text":"バイタルサイン測定は不要である。"},{"id":5,"text":"頸椎保護は不要である。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第6章「受傷機転・外傷の病態生理」p.694～701（高エネルギー外傷）","source_page":"p.694～701","reference_topic":"高エネルギー外傷"},{"id":1599,"number":1599,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（外傷診療）","difficulty":"難問","format":"","question":"外傷診療で受傷機転を把握する目的として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"潜在的な損傷を予測する。"},{"id":2,"text":"搬送先や診療方針の判断に役立てる。"},{"id":3,"text":"外表創だけで診断を確定する。"},{"id":4,"text":"バイタルサインの評価を省略する。"},{"id":5,"text":"重症度判定には不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転・外傷の病態生理」p.694～701（受傷機転の意義）","source_page":"p.694～701","reference_topic":"受傷機転の意義"},{"id":1600,"number":1600,"version":"正式版 Ver1.1","category":"第Ⅲ編 第6章 外傷救急医学（外傷総論）","difficulty":"難問","format":"","question":"外傷傷病者に対する救急活動として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"全身を系統的に観察し、多発外傷を考慮する。"},{"id":2,"text":"継続的に再評価を実施する。"},{"id":3,"text":"初回評価後の状態変化は考慮しなくてよい。"},{"id":4,"text":"外表損傷が軽微なら詳細な観察は不要である。"},{"id":5,"text":"受傷機転は活動に影響しない。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第6章「受傷機転・外傷の病態生理」p.694～701（総論）","source_page":"p.694～701","reference_topic":"総論"},{"id":1601,"number":1601,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 急性中毒学・環境障害（中毒総論）","difficulty":"一般","format":"5択1答","question":"急性中毒について正しいものはどれか。1つ選べ。","choices":[{"id":1,"text":"中毒起因物質が比較的短時間で中毒症状を生じる状態である。"},{"id":2,"text":"中毒は内因性物質のみで生じる。"},{"id":3,"text":"慢性中毒と急性中毒は同じ概念である。"},{"id":4,"text":"中毒症状は必ず数年後に発症する。"},{"id":5,"text":"許容量以下の摂取でも必ず中毒となる。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第7章「中毒総論」p.785（中毒とは）","source_page":"p.785","reference_topic":"中毒とは"},{"id":1602,"number":1602,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 急性中毒学・環境障害（急性中毒の疫学）","difficulty":"一般","format":"5択2答","question":"2023年の日本中毒情報センターへの急性中毒相談について正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"最も多い中毒起因物質は家庭用品である。"},{"id":2,"text":"医療用医薬品は家庭用品に次いで多い。"},{"id":3,"text":"農業用品が最も多い。"},{"id":4,"text":"自然毒が半数以上を占める。"},{"id":5,"text":"工業用品が全体の半数を占める。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第7章「中毒総論」p.785（急性中毒の疫学）","source_page":"p.785","reference_topic":"急性中毒の疫学"},{"id":1603,"number":1603,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 急性中毒学・環境障害（吸収）","difficulty":"国家試験レベル","format":"症例問題・5択1答","question":"中毒起因物質の吸収経路のうち、一般に最も吸収が速いものはどれか。1つ選べ。","choices":[{"id":1,"text":"経静脈投与"},{"id":2,"text":"吸入"},{"id":3,"text":"経口摂取"},{"id":4,"text":"経皮吸収"},{"id":5,"text":"経眼吸収"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第7章「中毒総論」p.786～787（吸収）","source_page":"p.786～787","reference_topic":"吸収"},{"id":1604,"number":1604,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 急性中毒学・環境障害（吸収・病態生理）","difficulty":"難問","format":"5択2答","question":"中毒起因物質の吸収について正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"一般に気体は固体より吸収が速い。"},{"id":2,"text":"脂溶性物質は水溶性物質より吸収が速い。"},{"id":3,"text":"経皮吸収が最も速い。"},{"id":4,"text":"固体は気体より吸収が速い。"},{"id":5,"text":"水溶性物質は必ず脂溶性物質より吸収が速い。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第7章「中毒総論」p.786～787（吸収）","source_page":"p.786～787","reference_topic":"吸収"},{"id":1605,"number":1605,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 急性中毒学・環境障害（代謝・排泄）","difficulty":"難問","format":"5択2答","question":"中毒起因物質の代謝・排泄について正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"肝機能や腎機能の低下は中毒症状を遷延・増悪させる要因となる。"},{"id":2,"text":"フェノバルビタールやテオフィリンは腸肝循環を行う代表例である。"},{"id":3,"text":"すべての中毒起因物質は代謝されずに尿中へ排泄される。"},{"id":4,"text":"腸肝循環は中毒症状に影響しない。"},{"id":5,"text":"肝機能は中毒の経過に無関係である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第7章「中毒総論」p.786～787（代謝・排泄）","source_page":"p.786～787","reference_topic":"代謝・排泄"},{"id":1606,"number":1606,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 急性中毒学・環境障害（解毒・拮抗）","difficulty":"一般","format":"5択1答","question":"中毒起因物質の作用を特異的に減弱させる薬剤を何というか。1つ選べ。","choices":[{"id":1,"text":"拮抗薬"},{"id":2,"text":"利尿薬"},{"id":3,"text":"抗菌薬"},{"id":4,"text":"解熱薬"},{"id":5,"text":"降圧薬"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第7章「中毒総論」p.787（解毒・拮抗）","source_page":"p.787","reference_topic":"解毒・拮抗"},{"id":1607,"number":1607,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 急性中毒学・環境障害（解毒薬・拮抗薬）","difficulty":"一般","format":"5択2答","question":"中毒起因物 :"第Ⅲ編 第7章「異物」p.806～808（気道異物）","source_page":"p.806～808","reference_topic":"気道異物"},{"id":1697,"number":1697,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 異物（気道異物）","difficulty":"一般","format":"","question":"気道異物による窒息について正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"有効な咳が可能であれば咳を継続させる。"},{"id":2,"text":"重度の気道閉塞では異物除去手技を考慮する。"},{"id":3,"text":"無症状でも腹部突き上げ法を行う。"},{"id":4,"text":"気道評価は不要である。"},{"id":5,"text":"意識障害があっても観察のみでよい。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第7章「異物」p.806～809（気道異物）","source_page":"p.806～809","reference_topic":"気道異物"},{"id":1698,"number":1698,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 異物（食道異物）","difficulty":"国家試験レベル","format":"","question":"小児がコインを飲み込んだ可能性があり、呼吸状態は安定している。最も重要な対応はどれか。1つ選べ。","choices":[{"id":1,"text":"医療機関へ搬送し評価を受ける。"},{"id":2,"text":"無理に吐かせる。"},{"id":3,"text":"大量の水を飲ませる。"},{"id":4,"text":"背部叩打法を繰り返す。"},{"id":5,"text":"経過観察のみとする。"}],"answer":[1],"answer_text":"1","source":"第Ⅲ編 第7章「異物」p.808～809（食道異物）","source_page":"p.808～809","reference_topic":"食道異物"},{"id":1699,"number":1699,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 異物（ボタン電池・磁石誤飲）","difficulty":"難問","format":"","question":"ボタン電池や複数の磁石を誤飲した場合について正しいものはどれか。2つ選べ。","choices":[{"id":1,"text":"重篤な消化管障害を生じることがある。"},{"id":2,"text":"速やかな医療機関受診が重要である。"},{"id":3,"text":"症状がなければ対応は不要である。"},{"id":4,"text":"必ず自然排出を待つ。"},{"id":5,"text":"胃洗浄を第一選択とする。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第7章「異物」p.808～810（ボタン電池・磁石誤飲）","source_page":"p.808～810","reference_topic":"ボタン電池・磁石誤飲"},{"id":1700,"number":1700,"version":"正式版 Ver1.1","category":"第Ⅲ編 第7章 異物（異物総論）","difficulty":"難問","format":"","question":"異物誤飲傷病者への対応として適切なものはどれか。2つ選べ。","choices":[{"id":1,"text":"異物の種類や大きさを確認する。"},{"id":2,"text":"呼吸状態や気道閉塞の有無を評価する。"},{"id":3,"text":"すべての異物で催吐を行う。"},{"id":4,"text":"症状が軽ければ情報収集は不要である。"},{"id":5,"text":"原因物の確認は不要である。"}],"answer":[1,2],"answer_text":"1・2","source":"第Ⅲ編 第7章「異物」p.806～810（異物総論）","source_page":"p.806～810","reference_topic":"異物総論"}]</script>
<script>
const STORAGE_KEY = "emt_exam_tool_v5_1700";
const SESSION_KEY = "emt_exam_tool_v5_session";
let rawQuestions = [];
let questions = [];
let session = { pool: [], index: 0, mode: "practice", startedAt: null, testEndAt: null, selected: [], answered: false, lastResult: null };
let state = loadState();
let timerId = null;

const $ = id => document.getElementById(id);
const marks = ["①","②","③","④","⑤"];

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { records: {} };
  } catch(e) {
    return { records: {} };
  }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function saveSession() { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); }
function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; }
}
function rec(id) {
  id = String(id);
  if(!state.records[id]) state.records[id] = { correct:0, wrong:0, mark:"", bookmark:false, seen:0, last:false };
  return state.records[id];
}
function normalizeQuestion(q, idx) {
  const id = Number(q.number ?? q.id ?? (idx+1));
  const choices = (q.choices || []).map((c, i) => {
    if(typeof c === "string") return { original: i+1, text: c };
    return { original: Number(c.id ?? i+1), text: c.text ?? String(c) };
  });
  const ans = (q.answer || q.answers || []).map(Number);
  const ref = (() => {
    if(q.reference && typeof q.reference === "object") {
      return q.reference.raw || [q.reference.volume, q.reference.chapter, q.reference.page ? "p."+q.reference.page : ""].filter(Boolean).join(" ");
    }
    return q.source || q.reference || "";
  })();
  const sourcePage = q.source_page || (q.reference && q.reference.page) || q.page || "";
  return {
    id,
    number: id,
    category: q.category || q.field || "",
    chapter: q.chapter || q.reference_topic || "",
    difficulty: q.difficulty || q.level || "",
    type: q.type || q.format || "",
    question: q.question || "",
    choices,
    answer: ans,
    source: ref,
    sourcePage,
    raw: q
  };
}
function loadEmbedded() {
  const txt = $("embeddedQuestions").textContent.trim();
  rawQuestions = JSON.parse(txt);
  questions = rawQuestions.map(normalizeQuestion).sort((a,b)=>a.number-b.number);
  $("loadStatus").textContent = "読込OK";
  $("countBadge").textContent = questions.length + "問";
  setupFilters();
  updateStats();
}
function setupFilters() {
  fillSelect("filterDifficulty", unique(questions.map(q=>q.difficulty).filter(Boolean)), "全難易度");
  fillSelect("filterCategory", unique(questions.map(q=>q.category).filter(Boolean)), "全分野");
  fillSelect("filterChapter", unique(questions.map(q=>q.chapter).filter(Boolean)), "全章");
}
function fillSelect(id, values, first) {
  const el = $(id);
  const current = el.value;
  el.innerHTML = `<option value="">${first}</option>` + values.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
  if(values.includes(current)) el.value = current;
}
function unique(arr) { return [...new Set(arr)].sort((a,b)=>String(a).localeCompare(String(b),"ja")); }
function shuffle(arr) {
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function makePool(random=false) {
  const mode = $("mode").value;
  const diff = $("filterDifficulty").value;
  const cat = $("filterCategory").value;
  const chap = $("filterChapter").value;
  const mark = $("filterMark").value;
  const rs = Number($("rangeStart").value || 1);
  const re = Number($("rangeEnd").value || 999999);

  let pool = questions.filter(q => {
    const r = rec(q.id);
    if(diff && q.difficulty !== diff) return false;
    if(cat && q.category !== cat) return false;
    if(chap && q.chapter !== chap) return false;
    if(q.number < rs || q.number > re) return false;
    if(mark) {
      if(mark === "blank" && r.mark) return false;
      if(mark !== "blank" && r.mark !== mark) return false;
    }
    if(mode === "review" && !(r.wrong > 0 || r.mark === "×" || r.mark === "△")) return false;
    if(mode === "weak") {
      const total = r.correct + r.wrong;
      const rate = total ? r.correct / total : 1;
      if(!(r.wrong >= 2 || (total >= 3 && rate < 0.6) || r.mark === "×")) return false;
    }
    if(mode === "bookmarked" && !r.bookmark) return false;
    return true;
  });
  if(random || mode === "test200") pool = shuffle(pool);
  if(mode === "test200") pool = pool.slice(0, 200);
  return pool.map(q=>q.id);
}
function start(random=false) {
  const pool = makePool(random);
  if(!pool.length) {
    $("questionArea").innerHTML = `<div class="result ng">条件に一致する問題がありません。</div>`;
    return;
  }
  session = { pool, index: 0, mode: $("mode").value, startedAt: Date.now(), testEndAt: null, selected: [], answered:false, lastResult:null };
  if(session.mode === "test200") {
    const min = Number($("testMinutes").value);
    if(min > 0) session.testEndAt = Date.now() + min*60*1000;
  }
  saveSession();
  startTimer();
  render();
}
function resume() {
  const s = loadSession();
  if(s && Array.isArray(s.pool) && s.pool.length) {
    session = s;
    startTimer();
    render();
  } else {
    $("questionArea").innerHTML = `<div class="result ng">保存された途中セッションはありません。</div>`;
  }
}
function currentQuestion() { return questions.find(q=>q.id === session.pool[session.index]); }
function render() {
  const q = currentQuestion();
  if(!q) {
    renderFinished();
    return;
  }
  const r = rec(q.id);
  r.last = true;
  Object.keys(state.records).forEach(k=>{ if(Number(k)!==q.id) state.records[k].last=false; });
  saveState();

  const shuffledChoices = shuffle(q.choices).map((c, i)=>({...c, display:i+1}));
  q._displayChoices = shuffledChoices;
  session.selected = [];
  session.answered = false;
  session.lastResult = null;
  saveSession();

  const progress = Math.round(((session.index+1)/session.pool.length)*100);
  $("questionArea").innerHTML = `
    <div class="meta">
      <span class="tag">No.${q.number}</span>
      <span class="tag">${escapeHtml(q.difficulty || "難易度なし")}</span>
      <span class="tag">${escapeHtml(q.type || (q.answer.length===2 ? "5択2答" : "5択1答"))}</span>
      <span class="tag">${escapeHtml(q.category || "分野なし")}</span>
      ${q.chapter ? `<span class="tag">${escapeHtml(q.chapter)}</span>` : ""}
      <span class="tag">${session.index+1} / ${session.pool.length}</span>
    </div>
    <div class="progressbar"><div style="width:${progress}%"></div></div>
    <div class="q-title">${escapeHtml(q.question)}</div>
    <div class="small">選択肢は毎回ランダム表示されます。${q.answer.length}個選んで「回答する」を押してください。</div>
    <div class="choices">
      ${shuffledChoices.map((c,i)=>`
        <div class="choice" data-original="${c.original}">
          <div class="choiceMark">${marks[i]}</div>
          <div class="choice-text">${escapeHtml(c.text)}</div>
          <div class="judge hidden"></div>
        </div>
      `).join("")}
    </div>
    <div id="resultBox"></div>
    <div class="reference">
      <b>出典：</b>${escapeHtml(q.source || "未設定")}${q.sourcePage ? " ／ " + escapeHtml(String(q.sourcePage)) : ""}
    </div>
    <div class="mark-buttons">
      <button data-mark="○">○ 理解</button>
      <button data-mark="△">△ あやしい</button>
      <button data-mark="×">× 分からない</button>
      <button id="bookmarkBtn">${r.bookmark ? "★ ブックマーク解除" : "☆ ブックマーク"}</button>
    </div>
  `;
  document.querySelectorAll(".choice").forEach(el => el.addEventListener("click", () => toggleChoice(el, q.answer.length)));
  document.querySelectorAll(".mark-buttons button[data-mark]").forEach(btn => {
    if(btn.dataset.mark === r.mark) btn.classList.add("active");
    btn.addEventListener("click", () => setMark(q.id, btn.dataset.mark));
  });
  $("bookmarkBtn").addEventListener("click", () => toggleBookmark(q.id));
  updateStats();
}
function toggleChoice(el, max) {
  if(session.answered) return;
  const orig = Number(el.dataset.original);
  const i = session.selected.indexOf(orig);
  if(i >= 0) {
    session.selected.splice(i,1);
    el.classList.remove("selected");
  } else {
    if(session.selected.length >= max) {
      const old = session.selected.shift();
      document.querySelector(`.choice[data-original="${old}"]`)?.classList.remove("selected");
    }
    session.selected.push(orig);
    el.classList.add("selected");
  }
  saveSession();
}
function answer(forceWrong=false) {
  const q = currentQuestion();
  if(!q || session.answered) return;
  const selected = forceWrong ? [] : session.selected.slice().sort((a,b)=>a-b);
  const correct = q.answer.slice().sort((a,b)=>a-b);
  const ok = !forceWrong && selected.length === correct.length && selected.every((v,i)=>v===correct[i]);
  session.answered = true;
  session.lastResult = ok;
  const r = rec(q.id);
  r.seen += 1;
  if(ok) r.correct += 1; else r.wrong += 1;
  if(forceWrong) r.mark = "×";
  saveState();

  document.querySelectorAll(".choice").forEach(el => {
    const orig = Number(el.dataset.original);
    const isCorrect = correct.includes(orig);
    const isSelected = selected.includes(orig);
    const judge = el.querySelector(".judge");
    judge.classList.remove("hidden");
    if(isCorrect) {
      el.classList.add("correct");
      judge.textContent = "正答";
      judge.classList.add("ok");
    } else if(isSelected) {
      el.classList.add("wrong");
      judge.textContent = "選択";
      judge.classList.add("ng");
    } else {
      judge.textContent = "";
    }
  });

  const correctLabels = q._displayChoices
    .map((c,i)=> correct.includes(c.original) ? marks[i] : null)
    .filter(Boolean)
    .join("・");

  $("resultBox").innerHTML = `<div class="result ${ok ? "ok" : "ng"}">${ok ? "正解" : "不正解"}<br>正答：${correctLabels}</div>`;
  saveSession();
  updateStats();
}
function next() {
  if(session.index < session.pool.length-1) {
    session.index++;
    render();
  } else {
    renderFinished();
  }
}
function prev() {
  if(session.index > 0) {
    session.index--;
    render();
  }
}
function renderFinished() {
  const total = session.pool.length;
  let c=0,w=0;
  session.pool.forEach(id=>{ const r=rec(id); c+=r.correct; w+=r.wrong; });
  $("questionArea").innerHTML = `<div class="result ok">今回のセッションは終了です。<br>出題数：${total}問</div>`;
  updateAnalysis();
}
function setMark(id, mark) {
  const r = rec(id);
  r.mark = r.mark === mark ? "" : mark;
  saveState();
  render();
}
function toggleBookmark(id) {
  const r = rec(id);
  r.bookmark = !r.bookmark;
  saveState();
  render();
}
function updateStats() {
  const all = questions.length;
  let seen=0, correct=0, wrong=0, bm=0, maru=0, sankaku=0, batsu=0;
  questions.forEach(q => {
    const r = rec(q.id);
    if(r.seen>0 || r.correct>0 || r.wrong>0) seen++;
    correct += r.correct;
    wrong += r.wrong;
    if(r.bookmark) bm++;
    if(r.mark==="○") maru++;
    if(r.mark==="△") sankaku++;
    if(r.mark==="×") batsu++;
  });
  const totalAns = correct + wrong;
  const rate = totalAns ? Math.round(correct/totalAns*1000)/10 : 0;
  $("statsArea").innerHTML = `
    <div class="stat"><div class="small">収録問題</div><div class="num">${all}</div></div>
    <div class="stat"><div class="small">学習済み</div><div class="num">${seen}</div></div>
    <div class="stat"><div class="small">総正答率</div><div class="num">${rate}%</div></div>
    <div class="stat"><div class="small">正解 / 不正解</div><div class="num">${correct} / ${wrong}</div></div>
    <div class="stat"><div class="small">ブックマーク</div><div class="num">${bm}</div></div>
    <div class="stat"><div class="small">○ △ ×</div><div class="num">${maru} / ${sankaku} / ${batsu}</div></div>
  `;
}
function updateAnalysis() {
  const groups = {};
  questions.forEach(q => {
    const key = q.category || "未分類";
    if(!groups[key]) groups[key] = { total:0, seen:0, correct:0, wrong:0 };
    const g = groups[key], r = rec(q.id);
    g.total++;
    if(r.seen>0 || r.correct>0 || r.wrong>0) g.seen++;
    g.correct += r.correct;
    g.wrong += r.wrong;
  });
  const rows = Object.entries(groups).map(([k,g]) => {
    const ans = g.correct + g.wrong;
    const rate = ans ? Math.round(g.correct/ans*1000)/10 : "";
    return { k, ...g, rate };
  }).sort((a,b)=> {
    if(a.rate === "" && b.rate !== "") return 1;
    if(a.rate !== "" && b.rate === "") return -1;
    return (a.rate||0) - (b.rate||0);
  });
  $("analysisArea").innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>分野</th><th>問題数</th><th>学習済み</th><th>正解</th><th>不正解</th><th>正答率</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr><td>${escapeHtml(r.k)}</td><td>${r.total}</td><td>${r.seen}</td><td>${r.correct}</td><td>${r.wrong}</td><td>${r.rate==="" ? "-" : r.rate+"%"}</td></tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
}
function startTimer() {
  if(timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    if(!session.testEndAt) {
      $("timerBadge").textContent = "--:--";
      return;
    }
    const left = session.testEndAt - Date.now();
    if(left <= 0) {
      $("timerBadge").textContent = "00:00";
      clearInterval(timerId);
      renderFinished();
      return;
    }
    const m = Math.floor(left/60000);
    const s = Math.floor((left%60000)/1000);
    $("timerBadge").textContent = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  }, 500);
}
function resetSession() {
  localStorage.removeItem(SESSION_KEY);
  session = { pool: [], index: 0, mode: "practice", startedAt: null, testEndAt: null, selected: [], answered:false, lastResult:null };
  $("questionArea").innerHTML = `<div class="small">今回のセッションをリセットしました。開始ボタンを押してください。</div>`;
}
function clearLearning() {
  if(confirm("学習記録をすべて削除します。よろしいですか？")) {
    state = { records: {} };
    saveState();
    updateStats();
    updateAnalysis();
    render();
  }
}
function exportLearning() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "救命士国家試験学習記録.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importLearning(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      state = JSON.parse(reader.result);
      if(!state.records) state.records = {};
      saveState();
      updateStats();
      updateAnalysis();
      alert("学習記録を読み込みました。");
    } catch(e) { alert("読み込みに失敗しました。"); }
  };
  reader.readAsText(file, "utf-8");
}
function manualLoad(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      rawQuestions = JSON.parse(reader.result);
      questions = rawQuestions.map(normalizeQuestion).sort((a,b)=>a.number-b.number);
      setupFilters();
      $("loadStatus").textContent = "手動読込OK";
      $("countBadge").textContent = questions.length + "問";
      updateStats();
      resetSession();
    } catch(e) { alert("JSONの読み込みに失敗しました。"); }
  };
  reader.readAsText(file, "utf-8");
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

$("startBtn").addEventListener("click", () => start(false));
$("shuffleBtn").addEventListener("click", () => start(true));
$("resumeBtn").addEventListener("click", resume);
$("answerBtn").addEventListener("click", () => answer(false));
$("unknownBtn").addEventListener("click", () => answer(true));
$("nextBtn").addEventListener("click", next);
$("prevBtn").addEventListener("click", prev);
$("resetSessionBtn").addEventListener("click", resetSession);
$("clearLearningBtn").addEventListener("click", clearLearning);
$("analysisBtn").addEventListener("click", updateAnalysis);
$("exportBtn").addEventListener("click", exportLearning);
$("importBtn").addEventListener("click", ()=>$("importInput").click());
$("importInput").addEventListener("change", e => e.target.files[0] && importLearning(e.target.files[0]));
$("manualBtn").addEventListener("click", ()=>$("fileInput").click());
$("fileInput").addEventListener("change", e => e.target.files[0] && manualLoad(e.target.files[0]));

loadEmbedded();
startTimer();
</script>
</body>
</html>
